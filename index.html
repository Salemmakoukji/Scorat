<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorat - Match Tracker</title>
    
    <!-- PWA / App Meta Tags -->
    <meta name="theme-color" content="#f8f9fa" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Scorat">
    <link rel="icon" href="./logo.png" type="image/x-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- Immediate Theme Loading (Fixes Flash) -->
    <script>
        const savedTheme = localStorage.getItem('scorat_theme');
        const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        
        const savedColor = localStorage.getItem('scorat_color') || 'blue';
        const colors = {
            blue: { primary: '#1a73e8', light: '#e8f0fe', dark: '#8ab4f8' },
            emerald: { primary: '#10b981', light: '#d1fae5', dark: '#34d399' },
            purple: { primary: '#8b5cf6', light: '#ede9fe', dark: '#a78bfa' },
            rose: { primary: '#f43f5e', light: '#ffe4e6', dark: '#fb7185' }
        };
        const c = colors[savedColor];
        document.documentElement.style.setProperty('--color-primary', c.primary);
        document.documentElement.style.setProperty('--color-primary-light', c.light);
        document.documentElement.style.setProperty('--color-primary-dark', c.dark);
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'sans-serif'] },
                    colors: {
                        primary: 'var(--color-primary)',
                        'primary-light': 'var(--color-primary-light)',
                        'primary-dark': 'var(--color-primary-dark)',
                        google: {
                            red: '#ea4335', redLight: '#fce8e6',
                            bgLight: '#f8f9fa', surfaceLight: '#ffffff', textLight: '#202124', textMuted: '#5f6368',
                            bgDark: '#202124', surfaceDark: '#303134', textDark: '#e8eaed', borderLight: '#dadce0', borderDark: '#5f6368'
                        }
                    },
                    boxShadow: {
                        'google': '0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15)',
                        'google-hover': '0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-unfilled { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Smooth Page Transitions */
        .page-enter { animation: fadeSlideUp 0.3s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 9999; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body class="bg-google-bgLight text-google-textLight dark:bg-google-bgDark dark:text-google-textDark transition-colors duration-300 pb-28 min-h-screen select-none overscroll-none">

    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto relative min-h-screen flex flex-col pt-4 px-4">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold tracking-tight text-primary dark:text-primary-dark flex items-center gap-2">
                <span class="material-symbols-outlined text-3xl">sports_score</span> Scorat
            </h1>
            <div class="flex gap-2">
                <button onclick="vibe(); switchTab('leaderboard')" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-google-textMuted dark:text-google-textDark">
                    <span class="material-symbols-outlined icon-unfilled">leaderboard</span>
                </button>
                <button onclick="vibe(); switchTab('stats')" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-google-textMuted dark:text-google-textDark">
                    <span class="material-symbols-outlined icon-unfilled">bar_chart</span>
                </button>
                <button onclick="vibe(); switchTab('settings')" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-google-textMuted dark:text-google-textDark">
                    <span class="material-symbols-outlined icon-unfilled">settings</span>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="content" class="flex-1 w-full flex flex-col gap-4 page-enter"></main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[400px] bg-google-surfaceLight dark:bg-google-surfaceDark rounded-full shadow-google flex justify-between items-center px-4 py-2 z-40 border border-google-borderLight dark:border-google-borderDark">
            <button data-tab="main" class="nav-btn flex flex-col items-center justify-center w-12 h-12 rounded-full text-google-textMuted dark:text-google-textDark hover:bg-primary-light dark:hover:bg-primary/20 transition-colors">
                <span class="material-symbols-outlined icon-unfilled text-2xl nav-icon">home</span>
            </button>
            <button data-tab="players" class="nav-btn flex flex-col items-center justify-center w-12 h-12 rounded-full text-google-textMuted dark:text-google-textDark hover:bg-primary-light dark:hover:bg-primary/20 transition-colors">
                <span class="material-symbols-outlined icon-unfilled text-2xl nav-icon">group</span>
            </button>
            
            <!-- Prominent Add Round FAB -->
            <button id="btn-add-round" onclick="vibe(80)" class="relative -top-6 bg-primary dark:bg-primary-dark text-white dark:text-google-bgDark w-16 h-16 rounded-[20px] shadow-google-hover flex items-center justify-center hover:scale-105 active:scale-95 transition-transform border-4 border-google-bgLight dark:border-google-bgDark">
                <span class="material-symbols-outlined text-3xl font-bold">add</span>
            </button>
            
            <button data-tab="live" class="nav-btn flex flex-col items-center justify-center w-12 h-12 rounded-full text-google-textMuted dark:text-google-textDark hover:bg-primary-light dark:hover:bg-primary/20 transition-colors relative">
                <span class="material-symbols-outlined icon-unfilled text-2xl nav-icon">podcasts</span>
                <span id="live-indicator" class="absolute top-2 right-2 w-2.5 h-2.5 bg-google-red rounded-full animate-pulse hidden border-2 border-white dark:border-google-surfaceDark"></span>
            </button>
            <button data-tab="history" class="nav-btn flex flex-col items-center justify-center w-12 h-12 rounded-full text-google-textMuted dark:text-google-textDark hover:bg-primary-light dark:hover:bg-primary/20 transition-colors">
                <span class="material-symbols-outlined icon-unfilled text-2xl nav-icon">history</span>
            </button>
        </nav>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center pb-0 sm:pb-0">
        <div id="modal-content" class="bg-google-surfaceLight dark:bg-google-surfaceDark w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl transform transition-transform translate-y-full max-h-[85vh] overflow-y-auto">
            <!-- Modal inner content -->
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-28 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-[calc(100%-2rem)] max-w-[400px]"></div>

    <!-- Onboarding Container -->
    <div id="onboarding-container" class="fixed inset-0 z-[100] hidden bg-google-bgLight dark:bg-google-bgDark flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center bg-google-surfaceLight dark:bg-google-surfaceDark p-8 rounded-[32px] shadow-google page-enter">
            <span class="material-symbols-outlined text-6xl text-primary dark:text-primary-dark mb-4">account_circle</span>
            <h2 class="text-3xl font-bold text-google-textLight dark:text-google-textDark mb-2">Welcome</h2>
            <p class="text-google-textMuted dark:text-gray-400 mb-6 text-sm">Create your profile to join the global roster.</p>
            
            <div class="flex flex-col gap-4">
                <div class="flex justify-center mb-2">
                    <div id="ob-avatar-preview" class="w-24 h-24 rounded-full bg-google-bgLight dark:bg-google-bgDark border-2 border-dashed border-google-borderLight dark:border-google-borderDark flex items-center justify-center overflow-hidden relative">
                        <span class="material-symbols-outlined text-3xl opacity-50">add_a_photo</span>
                    </div>
                </div>
                <label class="bg-primary-light dark:bg-google-surfaceDark text-primary dark:text-primary-dark px-4 py-2 rounded-full font-medium cursor-pointer text-sm hover:bg-black/5 transition-colors mx-auto border border-primary/20">
                    Choose Photo
                    <input type="file" accept="image/*" class="hidden" onchange="previewOnboardingAvatar(event)">
                </label>
                
                <input type="text" id="ob-player-name" placeholder="Enter Nickname" class="w-full mt-2 bg-google-bgLight dark:bg-google-bgDark border border-google-borderLight dark:border-google-borderDark text-google-textLight dark:text-google-textDark px-4 py-3 rounded-full font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none text-center select-text">
                
                <button onclick="vibe(); saveUserProfile()" class="w-full mt-4 bg-primary dark:bg-primary-dark text-white dark:text-google-bgDark py-3 rounded-full font-bold shadow-md hover:shadow-google-hover active:scale-95 transition-all">Start Playing</button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc, orderBy, query, updateDoc, increment, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* --- FIREBASE CONFIGURATION --- */
        const firebaseConfig = {
            apiKey: "AIzaSyAiX6ipa161rB1o715EfmtzfrHiz9zgChQ",
            authDomain: "dottech-scorat.firebaseapp.com",
            projectId: "dottech-scorat",
            storageBucket: "dottech-scorat.firebasestorage.app",
            messagingSenderId: "324240314924",
            appId: "1:324240314924:web:12866f2c25908f82fb7789",
            measurementId: "G-Y945QFFG3G"
        };

        const appId = 'scorat-app'; 
        let db, auth, currentUser;
        
        /* --- Global State --- */
        const state = {
            currentTab: 'main',
            settings: { haptics: true, notifications: false, m1: 351, m2: 551 },
            players: [], history: [], liveGames: [],
            spectatingMatchId: null, hostChatData: [],
            activeGame: { team1: [null, null], team2: [null, null], rounds: [], m1Triggered: false, m2Triggered: false, gameOver: false },
            tempHistoryId: null, lastActiveState: null, notifiedGames: new Set()
        };
        window.state = state;

        let debounceTimer; let onboardingAvatarBase64 = null;
        let unsubLiveGame = null; let unsubLiveChat = null; let unsubHostChat = null;

        /* --- PWA Setup (Executed immediately) --- */
        let deferredPrompt;
        
        // 1. Valid Manifest (No Blob URL, fixes Chrome PWA block)
        const manifest = { "name": "Scorat", "short_name": "Scorat", "start_url": ".", "display": "standalone", "background_color": "#f8f9fa", "theme_color": "#1a73e8", "icons": [{ "src": "https://api.dicebear.com/7.x/initials/svg?seed=Scorat&backgroundColor=1a73e8", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }] };
        const manifestLink = document.createElement('link'); manifestLink.rel = 'manifest'; 
        manifestLink.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(manifestLink);

        // 2. Listen for Install Prompt Early
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                if (document.getElementById('toast-container')) {
                    showToast("Install Scorat to your Home Screen!", "Install", () => {
                        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
                    });
                }
            }, 3000);
        });

        window.installPWA = function() {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
        };

        /* --- Initialization --- */
        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                try { await enableIndexedDbPersistence(db); } catch (err) { console.warn("Offline persistence failed", err); }

                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    if (user) { currentUser = user; await checkUserProfile(user.uid); }
                });
            } catch (error) { console.error("Firebase Init Error:", error); showToast("Failed to connect to database."); }
            bindEvents();
        }

        // Haptic Feedback Helper
        window.vibe = function(ms = 40) {
            if (navigator.vibrate && state.settings.haptics) navigator.vibrate(ms);
        };

        function sendPushNotification(title, body) {
            if (state.settings.notifications && Notification.permission === 'granted') {
                new Notification(title, { body, icon: './logo.png' });
            }
        }

        async function checkUserProfile(uid) {
            try {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid));
                if (!userDoc.exists()) document.getElementById('onboarding-container').classList.remove('hidden');
                else { document.getElementById('onboarding-container').classList.add('hidden'); setupListeners(); }
            } catch(e) { console.error(e); }
        }

        window.previewOnboardingAvatar = function(e) {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 150; let w = img.width; let h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } } else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    onboardingAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('ob-avatar-preview').innerHTML = `<img src="${onboardingAvatarBase64}" class="w-full h-full object-cover">`;
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        }

        window.saveUserProfile = async function() {
            const name = document.getElementById('ob-player-name').value.trim(); if (!name) return showToast("Nickname is required!");
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), { name, avatar: onboardingAvatarBase64, joinedAt: Date.now(), wins: 0, losses: 0 });
                document.getElementById('onboarding-container').classList.add('hidden'); showToast("Profile created!"); setupListeners();
            } catch (e) { showToast("Error creating profile."); }
        }

        /* --- Listeners --- */
        function setupListeners() {
            if (!currentUser) return; const uid = currentUser.uid;

            // Load Settings & apply logic
            const sStr = localStorage.getItem('scorat_settings');
            if(sStr) state.settings = { ...state.settings, ...JSON.parse(sStr) };

            onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), (snap) => {
                if (snap.exists()) { state.activeGame = snap.data(); checkMilestones(); } 
                else setDoc(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), state.activeGame);
                if (state.currentTab === 'main') renderMain();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                state.players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (['players', 'main', 'history', 'stats', 'leaderboard'].includes(state.currentTab)) renderActiveTab();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'history'), (snap) => {
                state.history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.date - a.date);
                if (['history', 'stats'].includes(state.currentTab)) renderActiveTab();
            });

            // Live Games Listener (Notifications & Co-op Host Sync)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'liveGames'), (snap) => {
                const games = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                state.liveGames = games.filter(g => g.id !== uid);
                
                // Notifications logic
                state.liveGames.forEach(g => {
                    if (!state.notifiedGames.has(g.id)) {
                        state.notifiedGames.add(g.id);
                        if (g.game.team1.includes(uid) || g.game.team2.includes(uid)) {
                            sendPushNotification("You've been added to a match!", `${g.hostName} is hosting a game with you.`);
                        }
                    }
                });

                document.getElementById('live-indicator').classList.toggle('hidden', state.liveGames.length === 0);
                if (state.currentTab === 'live') renderActiveTab();

                // Co-op Host Sync: If someone updated my hosted game
                const myLiveGame = games.find(g => g.id === uid);
                if (myLiveGame && myLiveGame.updatedBy && myLiveGame.updatedBy !== uid) {
                    state.activeGame = myLiveGame.game;
                    saveActiveGameLocalOnly(); 
                    if(state.currentTab === 'main') renderMain();
                }
            });
        }

        /* --- Game Logic --- */
        function saveActiveGame() {
            if (!currentUser) return; clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const uid = currentUser.uid;
                setDoc(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), state.activeGame).catch(e=>console.error(e));
                const liveRef = doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', uid);
                if (state.activeGame.rounds && state.activeGame.rounds.length > 0 && !state.activeGame.gameOver) {
                    setDoc(liveRef, { hostId: uid, hostName: state.players.find(p => p.id === uid)?.name || 'Player', game: state.activeGame, updatedAt: Date.now(), updatedBy: uid });
                } else deleteDoc(liveRef).catch(()=>{});
            }, 300);
        }

        function saveActiveGameLocalOnly() {
            if (!currentUser) return;
            setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'state', 'activeGame'), state.activeGame).catch(e=>console.error(e));
        }

        window.saveSettings = function() {
            localStorage.setItem('scorat_settings', JSON.stringify(state.settings));
            if(state.settings.notifications && Notification.permission !== 'granted') Notification.requestPermission();
            showToast("Settings saved.");
        }

        function checkMilestones() {
            let t1 = 0; let t2 = 0; (state.activeGame.rounds || []).forEach(r => { t1 += (parseInt(r.t1) || 0); t2 += (parseInt(r.t2) || 0); });
            const { m1, m2 } = state.settings;
            if ((t1 >= m1 || t2 >= m1) && !state.activeGame.m1Triggered) { state.activeGame.m1Triggered = true; playAlertSound('m1'); saveActiveGame(); }
            if ((t1 >= m2 || t2 >= m2) && !state.activeGame.gameOver) { state.activeGame.m2Triggered = true; state.activeGame.gameOver = true; playAlertSound('m2'); triggerCelebration(); saveActiveGame(); }
        }

        window.resetGame = async function() {
            vibe();
            if (!currentUser || !state.activeGame.rounds || state.activeGame.rounds.length === 0) return showToast("Board is clear.");
            state.lastActiveState = JSON.parse(JSON.stringify(state.activeGame)); 
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history'), { date: Date.now(), team1: state.activeGame.team1, team2: state.activeGame.team2, rounds: state.activeGame.rounds });
            state.tempHistoryId = docRef.id;

            let t1 = 0; let t2 = 0; state.activeGame.rounds.forEach(r => { t1 += (r.t1||0); t2 += (r.t2||0); }); const t1Won = t1 < t2;
            const updateStats = async (team, won) => { for (const pid of team) { if (pid) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', pid), { wins: increment(won ? 1 : 0), losses: increment(won ? 0 : 1) }); } catch(e) {} } } };
            await updateStats(state.activeGame.team1, t1Won); await updateStats(state.activeGame.team2, !t1Won);

            state.activeGame = { team1: state.activeGame.team1, team2: state.activeGame.team2, rounds: [], m1Triggered: false, m2Triggered: false, gameOver: false };
            saveActiveGame(); deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', currentUser.uid)).catch(()=>{});
            showToast("Game saved & reset.", "Undo", undoReset);
        }

        async function undoReset() {
            if (!currentUser || !state.lastActiveState || !state.tempHistoryId) return;
            let t1 = 0; let t2 = 0; state.lastActiveState.rounds.forEach(r => { t1 += (r.t1||0); t2 += (r.t2||0); }); const t1Won = t1 < t2;
            const revertStats = async (team, won) => { for (const pid of team) { if (pid) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', pid), { wins: increment(won ? -1 : 0), losses: increment(won ? 0 : -1) }); } catch(e) {} } } };
            await revertStats(state.lastActiveState.team1, t1Won); await revertStats(state.lastActiveState.team2, !t1Won);
            state.activeGame = state.lastActiveState; saveActiveGame();
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'history', state.tempHistoryId));
            state.tempHistoryId = null; state.lastActiveState = null; showToast("Reset undone.");
        }

        /* --- UI Rendering --- */
        window.switchTab = function(tabName) {
            vibe();
            if(unsubLiveGame) { unsubLiveGame(); unsubLiveGame = null; }
            if(unsubLiveChat) { unsubLiveChat(); unsubLiveChat = null; }
            state.currentTab = tabName;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const icon = btn.querySelector('.nav-icon');
                if (btn.dataset.tab === tabName) { 
                    btn.classList.add('text-primary', 'dark:text-primary-dark'); btn.classList.remove('text-google-textMuted', 'dark:text-google-textDark');
                    if(icon) icon.classList.remove('icon-unfilled');
                } else { 
                    btn.classList.remove('text-primary', 'dark:text-primary-dark'); btn.classList.add('text-google-textMuted', 'dark:text-google-textDark');
                    if(icon) icon.classList.add('icon-unfilled');
                }
            });
            const c = document.getElementById('content');
            c.classList.remove('page-enter');
            void c.offsetWidth; // trigger reflow
            c.classList.add('page-enter');
            renderActiveTab();
        }

        function renderActiveTab() {
            const c = document.getElementById('content'); c.innerHTML = '';
            if (state.currentTab === 'main') renderMain();
            else if (state.currentTab === 'players') renderPlayers();
            else if (state.currentTab === 'history') renderHistory();

        window.openPlayerProfile = function(playerId) {
            const player = state.players.find(p => p.id === playerId); if (!player || !currentUser) return;
            
            let h2hWins = 0; let h2hLosses = 0; let coopWins = 0; let coopLosses = 0;
            let teammates = {}; // to find loyal duo

            state.history.forEach(match => {
                const t1 = match.team1 || []; const t2 = match.team2 || [];
                const pInT1 = t1.includes(playerId); const pInT2 = t2.includes(playerId);
                
                // Track Teammates
                if(pInT1 || pInT2) {
                    const myT = pInT1 ? t1 : t2;
                    myT.forEach(id => { if(id && id !== playerId) teammates[id] = (teammates[id]||0)+1; });
                }

                // H2H logic
                if (playerId !== currentUser.uid) {
                    const myT1 = t1.includes(currentUser.uid); const myT2 = t2.includes(currentUser.uid);
                    if ((!myT1 && !myT2) || (!pInT1 && !pInT2)) return; 
                    let s1 = 0; let s2 = 0; match.rounds.forEach(r => { s1 += (r.t1||0); s2 += (r.t2||0); });
                    const t1Won = s1 < s2; const iWon = (myT1 && t1Won) || (myT2 && !t1Won);

                    if ((myT1 && pInT1) || (myT2 && pInT2)) { if (iWon) coopWins++; else coopLosses++; } 
                    else if ((myT1 && pInT2) || (myT2 && pInT1)) { if (iWon) h2hWins++; else h2hLosses++; }
                }
            });

            const total = (player.wins||0) + (player.losses||0);
            const rate = total > 0 ? ((player.wins||0) / total * 100).toFixed(0) : 0;
            
            // Badges
            let badges = [];
            if (total >= 10) badges.push({icon: 'shield', label: 'Veteran', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30'});
            if (total >= 5 && rate >= 60) badges.push({icon: 'local_fire_department', label: 'On Fire', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30'});
            if (player.wins >= 50) badges.push({icon: 'trophy', label: 'Champion', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30'});
            
            const topTeammateId = Object.keys(teammates).sort((a,b)=>teammates[b]-teammates[a])[0];
            if(topTeammateId && teammates[topTeammateId] >= 5) {
                badges.push({icon: 'handshake', label: 'Loyal Duo', color: 'text-primary', bg: 'bg-primary-light dark:bg-primary/20'});
            }

            const badgesHtml = badges.length > 0 ? `
                <div class="flex gap-2 justify-center flex-wrap mb-4">
                    ${badges.map(b => `<div class="${b.bg} ${b.color} px-3 py-1 rounded-full flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest"><span class="material-symbols-outlined text-[14px]">${b.icon}</span> ${b.label}</div>`).join('')}
                </div>` : '';

            showModal("Player Profile", `
                <div class="flex flex-col items-center mb-6">
                    <img src="${player.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + player.name}" class="w-24 h-24 rounded-full object-cover shadow-md mb-3 border-4 border-primary-light">
                    <h3 class="text-2xl font-black text-center mb-2">${player.name}</h3>
                    ${badgesHtml}
                    <div class="flex gap-6 mt-2 text-sm bg-google-surfaceLight dark:bg-google-surfaceDark px-6 py-3 rounded-[24px] shadow-sm border border-google-borderLight dark:border-google-borderDark">
                        <div class="text-center"><div class="font-black text-xl text-primary">${player.wins || 0}</div><div class="text-[10px] uppercase text-google-textMuted font-bold">Wins</div></div>
                        <div class="text-center"><div class="font-black text-xl text-google-red">${player.losses || 0}</div><div class="text-[10px] uppercase text-google-textMuted font-bold">Losses</div></div>
                        <div class="text-center"><div class="font-black text-xl">${rate}%</div><div class="text-[10px] uppercase text-google-textMuted font-bold">Win Rate</div></div>
                    </div>
                </div>
                ${playerId !== currentUser.uid ? `
                <div class="bg-google-bgLight dark:bg-google-bgDark rounded-[24px] p-5 border border-google-borderLight dark:border-google-borderDark mb-2 shadow-inner">
                    <h4 class="text-[11px] font-bold uppercase tracking-wider text-google-textMuted mb-3 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">compare_arrows</span> Head-to-Head vs You</h4>
                    <div class="flex justify-between items-center bg-google-surfaceLight dark:bg-google-surfaceDark p-3 rounded-2xl shadow-sm mb-2 border border-google-borderLight dark:border-google-borderDark">
                        <span class="text-sm font-medium">As Opponents</span><div class="font-bold text-sm"><span class="text-primary">${h2hWins}W</span> - <span class="text-google-red">${h2hLosses}L</span></div>
                    </div>
                    <div class="flex justify-between items-center bg-google-surfaceLight dark:bg-google-surfaceDark p-3 rounded-2xl shadow-sm border border-google-borderLight dark:border-google-borderDark">
                        <span class="text-sm font-medium">As Teammates</span><div class="font-bold text-sm"><span class="text-primary">${coopWins}W</span> - <span class="text-google-red">${coopLosses}L</span></div>
                    </div>
                </div>` : ''}
            `);
        }

        function renderLeaderboard() {
            const ranked = state.players.filter(p => (p.wins||0)>0 || (p.losses||0)>0).map(p => {
                const total = (p.wins||0) + (p.losses||0);
                return { ...p, rate: total>0 ? ((p.wins||0)/total)*100 : 0, total };
            }).sort((a,b) => b.rate!==a.rate ? b.rate-a.rate : (b.wins||0)-(a.wins||0));

            let html = ranked.map((p, index) => {
                let badge = `<span class="font-black text-google-textMuted text-lg w-6 text-center">${index + 1}</span>`;
                if(index===0) badge = `<span class="text-2xl">🥇</span>`; if(index===1) badge = `<span class="text-2xl">🥈</span>`; if(index===2) badge = `<span class="text-2xl">🥉</span>`;
                return `
                    <div onclick="vibe(); openPlayerProfile('${p.id}')" class="flex items-center p-4 bg-google-surfaceLight dark:bg-google-surfaceDark rounded-[24px] mb-3 shadow-sm border border-google-borderLight dark:border-google-borderDark cursor-pointer hover:shadow-google transition-all active:scale-[0.98]">
                        <div class="mr-3 flex justify-center w-8">${badge}</div>
                        <img src="${p.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + p.name}" class="w-10 h-10 rounded-full mr-3 object-cover shadow-sm">
                        <div class="flex-1"><h4 class="font-bold text-sm">${p.name}</h4><span class="text-[10px] font-medium text-google-textMuted">${p.wins||0}W - ${p.losses||0}L</span></div>
                        <div class="text-right"><div class="text-xl font-black ${index<3 ? 'text-primary' : ''}">${p.rate.toFixed(0)}%</div></div>
                    </div>`;
            }).join('');
            document.getElementById('content').innerHTML = `<div class="flex justify-between items-center mb-4"><button onclick="vibe(); switchTab('main')" class="p-2 -ml-2 rounded-full hover:bg-black/5 active:scale-95 transition-transform"><span class="material-symbols-outlined">arrow_back</span></button><h2 class="text-xl font-bold flex-1 ml-2">Global Leaderboard</h2></div><div class="flex-1 overflow-y-auto pb-6">${html || `<div class="text-center text-google-textMuted mt-10">No ranked players.</div>`}</div>`;
        }

        /* --- Settings & History --- */
        function renderHistory() {
            let html = state.history.map(h => {
                let t1 = 0; let t2 = 0; (h.rounds || []).forEach(r => { t1 += (r.t1||0); t2 += (r.t2||0); }); const t1Won = t1 < t2;
                return `
                    <div class="bg-google-surfaceLight dark:bg-google-surfaceDark rounded-[24px] p-4 mb-3 shadow-sm border border-google-borderLight dark:border-google-borderDark cursor-pointer hover:shadow-google transition-shadow active:scale-[0.98]" onclick="vibe(); viewMatchDetails('${h.id}')">
                        <div class="text-[10px] text-google-textMuted font-bold mb-2 uppercase">${new Date(h.date).toLocaleDateString()}</div>
                        <div class="flex justify-between items-center">
                            <div class="flex-1 text-center"><h3 class="text-2xl font-black ${t1Won ? 'text-primary dark:text-primary-dark' : 'text-google-textMuted'}">${t1}</h3></div>
                            <div class="px-2 text-google-borderLight dark:text-google-borderDark font-black">VS</div>
                            <div class="flex-1 text-center"><h3 class="text-2xl font-black ${!t1Won ? 'text-primary dark:text-primary-dark' : 'text-google-textMuted'}">${t2}</h3></div>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('content').innerHTML = `<h2 class="text-2xl font-bold mb-4">Match History</h2><div class="flex-1 overflow-y-auto pb-6">${html || `<div class="text-center text-google-textMuted mt-10">No history.</div>`}</div>`;
        }

        window.viewMatchDetails = function(matchId) {
            const match = state.history.find(m => m.id === matchId); if(!match) return;
            let t1 = 0; let t2 = 0;
            const roundsHtml = (match.rounds || []).map((r, i) => { t1 += (r.t1||0); t2 += (r.t2||0); return `<div class="flex justify-between py-2 border-b border-google-borderLight dark:border-google-borderDark text-sm"><span class="w-1/3 text-center font-bold">${r.t1||0}</span><span class="w-1/3 text-center text-google-textMuted">R${i+1}</span><span class="w-1/3 text-center font-bold">${r.t2||0}</span></div>`; }).join('');
            showModal("Match Details", `<div class="flex justify-between mb-4 bg-google-bgLight dark:bg-[#3c4043] p-4 rounded-2xl border border-google-borderLight dark:border-google-borderDark"><div class="text-center w-1/2 border-r border-google-borderLight dark:border-google-borderDark"><div class="text-3xl font-black">${t1}</div></div><div class="text-center w-1/2"><div class="text-3xl font-black">${t2}</div></div></div><div class="max-h-60 overflow-y-auto px-2">${roundsHtml}</div>`);
        }

        function renderStats() { document.getElementById('content').innerHTML = `<div class="flex justify-between items-center mb-4"><button onclick="vibe(); switchTab('main')" class="p-2 -ml-2 rounded-full hover:bg-black/5 active:scale-95 transition-transform"><span class="material-symbols-outlined">arrow_back</span></button><h2 class="text-xl font-bold flex-1 ml-2">Stats Moved</h2></div><div class="text-center text-google-textMuted mt-10">Detailed stats are now on Player Profiles!<br>Tap the Leaderboard icon or Roster.</div>`; }

        function renderSettings() {
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-4"><button onclick="vibe(); switchTab('main')" class="p-2 -ml-2 rounded-full hover:bg-black/5 active:scale-95 transition-transform"><span class="material-symbols-outlined">arrow_back</span></button><h2 class="text-xl font-bold flex-1 ml-2">Settings</h2></div>
                <div class="flex-1 overflow-y-auto pb-6 space-y-4 px-1">
                    
                    ${deferredPrompt ? `
                    <div class="bg-primary-light dark:bg-primary/20 p-5 rounded-[24px] shadow-sm border border-primary mb-4 flex justify-between items-center">
                        <div class="flex flex-col"><span class="font-bold text-sm text-primary dark:text-primary-dark flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">download</span> Install Scorat</span><span class="text-[10px] text-primary/70 dark:text-primary-dark/70 mt-1">Add App to Home Screen</span></div>
                        <button onclick="vibe(); installPWA()" class="bg-primary text-white px-4 py-2 rounded-full font-bold active:scale-95 transition-all text-xs shadow-md">Install</button>
                    </div>` : ''}

                    <div class="bg-google-surfaceLight dark:bg-google-surfaceDark p-5 rounded-[24px] shadow-sm border border-google-borderLight dark:border-google-borderDark">
                        <h3 class="text-[10px] font-bold uppercase text-google-textMuted mb-4 tracking-widest">Appearance</h3>
                        
                        <div class="flex justify-between items-center mb-5">
                            <span class="font-bold text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">dark_mode</span> Dark Mode</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.darkMode ? 'checked' : ''} onchange="vibe(); state.settings.darkMode=this.checked; updateThemeLogic();">
                                <div class="w-11 h-6 bg-google-borderLight dark:bg-google-borderDark peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                            </label>
                        </div>

                        <div>
                            <span class="font-bold text-sm block mb-3">Theme Color</span>
                            <div class="flex gap-4">
                                <button onclick="vibe(); changeColor('blue')" class="w-10 h-10 rounded-full bg-[#1a73e8] shadow-sm focus:ring-4 focus:ring-blue-200 active:scale-90 transition-transform"></button>
                                <button onclick="vibe(); changeColor('emerald')" class="w-10 h-10 rounded-full bg-[#10b981] shadow-sm focus:ring-4 focus:ring-emerald-200 active:scale-90 transition-transform"></button>
                                <button onclick="vibe(); changeColor('purple')" class="w-10 h-10 rounded-full bg-[#8b5cf6] shadow-sm focus:ring-4 focus:ring-purple-200 active:scale-90 transition-transform"></button>
                                <button onclick="vibe(); changeColor('rose')" class="w-10 h-10 rounded-full bg-[#f43f5e] shadow-sm focus:ring-4 focus:ring-rose-200 active:scale-90 transition-transform"></button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-google-surfaceLight dark:bg-google-surfaceDark p-5 rounded-[24px] shadow-sm border border-google-borderLight dark:border-google-borderDark">
                        <h3 class="text-[10px] font-bold uppercase text-google-textMuted mb-4 tracking-widest">Device Features</h3>
                        
                        <div class="flex justify-between items-center mb-5">
                            <div class="flex flex-col"><span class="font-bold text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">vibration</span> Haptic Feedback</span></div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.haptics ? 'checked' : ''} onchange="state.settings.haptics=this.checked; vibe(); saveSettings();">
                                <div class="w-11 h-6 bg-google-borderLight dark:bg-google-borderDark peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                            </label>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div class="flex flex-col"><span class="font-bold text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">notifications</span> Push Notifications</span><span class="text-[10px] text-google-textMuted mt-1">Get alerts for live chats</span></div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.notifications ? 'checked' : ''} onchange="vibe(); state.settings.notifications=this.checked; saveSettings();">
                                <div class="w-11 h-6 bg-google-borderLight dark:bg-google-borderDark peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                            </label>
                        </div>
                    </div>

                    <div class="bg-google-surfaceLight dark:bg-google-surfaceDark p-5 rounded-[24px] shadow-sm border border-google-borderLight dark:border-google-borderDark">
                        <h3 class="text-[10px] font-bold uppercase text-google-textMuted mb-4 tracking-widest">Match Rules</h3>
                        <div class="mb-3"><label class="block text-[10px] font-bold text-google-textMuted mb-1">Target 1</label><input type="number" value="${state.settings.m1}" onchange="state.settings.m1=parseInt(this.value)||0; saveSettings()" class="w-full bg-google-bgLight dark:bg-google-bgDark px-3 py-2 rounded-xl font-bold outline-none border border-google-borderLight dark:border-google-borderDark focus:border-primary select-text"></div>
                        <div><label class="block text-[10px] font-bold text-google-textMuted mb-1">Game Over Target</label><input type="number" value="${state.settings.m2}" onchange="state.settings.m2=parseInt(this.value)||0; saveSettings()" class="w-full bg-google-bgLight dark:bg-google-bgDark px-3 py-2 rounded-xl font-bold outline-none border border-google-borderLight dark:border-google-borderDark focus:border-google-red select-text"></div>
                    </div>
                </div>
            `;
        }

        window.updateThemeLogic = function() {
            localStorage.setItem('scorat_theme', state.settings.darkMode ? 'dark' : 'light');
            if (state.settings.darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            saveSettings();
        }

        window.changeColor = function(colorName) {
            localStorage.setItem('scorat_color', colorName);
            const colors = {
                blue: { primary: '#1a73e8', light: '#e8f0fe', dark: '#8ab4f8' },
                emerald: { primary: '#10b981', light: '#d1fae5', dark: '#34d399' },
                purple: { primary: '#8b5cf6', light: '#ede9fe', dark: '#a78bfa' },
                rose: { primary: '#f43f5e', light: '#ffe4e6', dark: '#fb7185' }
            };
            const c = colors[colorName];
            document.documentElement.style.setProperty('--color-primary', c.primary);
            document.documentElement.style.setProperty('--color-primary-light', c.light);
            document.documentElement.style.setProperty('--color-primary-dark', c.dark);
        }

        /* --- Utilities --- */
        const playAlertSound = (type) => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(type==='m1'?500:800, ctx.currentTime); gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + (type==='m1'?0.4:0.6)); osc.start(); osc.stop(ctx.currentTime + (type==='m1'?0.4:0.6)); } catch(e) {} };
        
        function applyTheme(isDark) { if (isDark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }

        function bindEvents() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', (e) => { const t = e.currentTarget.closest('.nav-btn').dataset.tab; if(t) switchTab(t); }));
            document.getElementById('btn-add-round').addEventListener('click', () => {
                if(state.currentTab !== 'main') switchTab('main');
                state.activeGame.rounds.push({ t1: null, t2: null }); saveActiveGame(); renderMain();
                setTimeout(() => { const ins = document.querySelectorAll('input[type="number"]'); if(ins.length>0) ins[ins.length - 2].focus(); }, 100);
            });
            document.getElementById('modal-container').addEventListener('click', (e) => { if(e.target.id === 'modal-container') closeModal(); });
        }

        function showModal(title, content) {
            const container = document.getElementById('modal-container'); const modContent = document.getElementById('modal-content');
            modContent.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold">${title}</h2><button onclick="closeModal()" class="p-2 rounded-full hover:bg-black/5"><span class="material-symbols-outlined">close</span></button></div><div class="mb-4">${content}</div>`;
            container.classList.remove('hidden'); setTimeout(() => modContent.classList.remove('translate-y-full'), 10);
        }

        window.closeModal = function() {
            if(unsubHostChat) { unsubHostChat(); unsubHostChat = null; }
            const container = document.getElementById('modal-container'); const modContent = document.getElementById('modal-content');
            modContent.classList.add('translate-y-full'); setTimeout(() => container.classList.add('hidden'), 300);
        }

        window.showToast = function(msg, actionLabel = null, actionCallback = null) {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `bg-google-textLight dark:bg-google-textDark text-white dark:text-google-bgDark px-4 py-3 rounded-xl shadow-google flex justify-between items-center transform transition-all duration-300 translate-y-10 opacity-0 mb-2`;
            let btnHtml = ''; if (actionLabel) { const btnId = 'toast-btn-' + Date.now(); window[btnId] = () => { actionCallback(); toast.remove(); }; btnHtml = `<button onclick="window['${btnId}']()" class="text-primary-light font-bold uppercase text-[10px] ml-4 tracking-widest">${actionLabel}</button>`; }
            toast.innerHTML = `<span class="font-medium text-sm">${msg}</span>${btnHtml}`; container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 5000);
        }

        function triggerCelebration() { showToast("Game Over!"); }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
