<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorat - Match Tracker</title>
    
    <!-- PWA / App Meta Tags -->
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Scorat">
    <link rel="icon" href="./logo.png" type="image/x-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- Immediate Theme Loading -->
    <script>
        const savedTheme = localStorage.getItem('scorat_theme');
        const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        
        const savedColor = localStorage.getItem('scorat_color') || 'blue';
        const colors = {
            blue: { primary: '#2563eb', light: '#eff6ff', dark: '#3b82f6' },
            emerald: { primary: '#10b981', light: '#ecfdf5', dark: '#34d399' },
            purple: { primary: '#8b5cf6', light: '#f5f3ff', dark: '#a78bfa' },
            rose: { primary: '#f43f5e', light: '#fff1f2', dark: '#fb7185' }
        };
        const c = colors[savedColor] || colors.blue;
        document.documentElement.style.setProperty('--color-primary', c.primary);
        document.documentElement.style.setProperty('--color-primary-light', c.light);
        document.documentElement.style.setProperty('--color-primary-dark', c.dark);
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: 'var(--color-primary)',
                        'primary-light': 'var(--color-primary-light)',
                        'primary-dark': 'var(--color-primary-dark)',
                        surface: { light: '#ffffff', dark: '#18181b' },
                        background: { light: '#f4f4f5', dark: '#09090b' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 40px -10px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Smooth Page Transitions */
        .page-enter { animation: fadeSlideUp 0.3s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-nav {
            background: rgba(24, 24, 27, 0.85);
        }

        .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 9999; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body class="bg-background-light text-zinc-800 dark:bg-background-dark dark:text-zinc-200 transition-colors duration-300 pb-32 min-h-screen select-none overscroll-none">

    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto relative min-h-screen flex flex-col pt-6 px-5">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold tracking-tight text-zinc-900 dark:text-white flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl bg-primary text-white flex items-center justify-center shadow-md">
                    <span class="material-symbols-outlined text-[20px]">bolt</span>
                </div>
                Scorat
            </h1>
            <div class="flex gap-2">
                <button onclick="location.href='./ConcanOnline.html'" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-light dark:bg-surface-dark shadow-sm hover:scale-105 active:scale-95 transition-all text-zinc-500">
                    <span class="material-symbols-outlined text-[20px]">playing_cards</span>
                </button>
                <button onclick="location.href='./minigames.html'" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-light dark:bg-surface-dark shadow-sm hover:scale-105 active:scale-95 transition-all text-zinc-500">
                    <span class="material-symbols-outlined text-[20px]">stadia_controller</span>
                </button>
                <button onclick="vibe(); switchTab('leaderboard')" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-light dark:bg-surface-dark shadow-sm hover:scale-105 active:scale-95 transition-all text-zinc-500">
                    <span class="material-symbols-outlined text-[20px]">emoji_events</span>
                </button>
                <button onclick="vibe(); switchTab('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-light dark:bg-surface-dark shadow-sm hover:scale-105 active:scale-95 transition-all text-zinc-500">
                    <span class="material-symbols-outlined text-[20px]">settings</span>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="content" class="flex-1 w-full flex flex-col gap-4 page-enter"></main>

        <!-- Floating Bottom Navigation -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2.5rem)] max-w-sm glass-nav rounded-3xl shadow-float flex justify-between items-center px-2 py-2 z-40 border border-zinc-200/50 dark:border-zinc-800/50">
            <button data-tab="main" class="nav-btn flex flex-col items-center justify-center w-14 h-12 rounded-2xl text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                <span class="material-symbols-outlined text-[22px]">home</span>
            </button>
            <button data-tab="players" class="nav-btn flex flex-col items-center justify-center w-14 h-12 rounded-2xl text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                <span class="material-symbols-outlined text-[22px]">group</span>
            </button>
            
            <!-- Floating Add Button -->
            <div class="relative -top-5 mx-2">
                <button id="btn-add-round" onclick="vibe(50)" class="bg-primary text-white w-14 h-14 rounded-full shadow-lg shadow-primary/30 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform border-[4px] border-background-light dark:border-background-dark">
                    <span class="material-symbols-outlined text-3xl font-medium">add</span>
                </button>
            </div>
            
            <button data-tab="live" class="nav-btn flex flex-col items-center justify-center w-14 h-12 rounded-2xl text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors relative">
                <span class="material-symbols-outlined text-[22px]">podcasts</span>
                <span id="live-indicator" class="absolute top-2 right-3 w-2 h-2 bg-red-500 rounded-full animate-pulse hidden"></span>
            </button>
            <button data-tab="history" class="nav-btn flex flex-col items-center justify-center w-14 h-12 rounded-2xl text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                <span class="material-symbols-outlined text-[22px]">history</span>
            </button>
        </nav>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden bg-zinc-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center pb-0 sm:pb-0">
        <div id="modal-content" class="bg-surface-light dark:bg-surface-dark w-full max-w-md rounded-t-[32px] sm:rounded-[32px] shadow-2xl transform transition-transform translate-y-full max-h-[90vh] flex flex-col">
            <!-- Modal Handle -->
            <div class="w-12 h-1.5 bg-zinc-300 dark:bg-zinc-700 rounded-full mx-auto mt-4 mb-2"></div>
            <div id="modal-inner" class="flex-1 overflow-y-auto px-6 pb-6 pt-2"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-[calc(100%-2.5rem)] max-w-sm pointer-events-none"></div>

    <!-- Onboarding Container -->
    <div id="onboarding-container" class="fixed inset-0 z-[100] hidden bg-background-light dark:bg-background-dark flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-surface-light dark:bg-surface-dark p-8 rounded-[32px] shadow-soft border border-zinc-100 dark:border-zinc-800 page-enter">
            
            <!-- View: Create New Profile -->
            <div id="view-create-profile" class="flex flex-col gap-4 items-center">
                <div class="w-16 h-16 rounded-2xl bg-primary-light text-primary flex items-center justify-center mb-2">
                    <span class="material-symbols-outlined text-4xl">account_circle</span>
                </div>
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-white">Welcome to Scorat</h2>
                <p class="text-zinc-500 text-sm text-center mb-2">Create your profile to join the global roster and start tracking.</p>
                
                <div class="relative mb-2">
                    <div id="ob-avatar-preview" class="w-24 h-24 rounded-full bg-zinc-100 dark:bg-zinc-800 border-2 border-dashed border-zinc-300 dark:border-zinc-600 flex items-center justify-center overflow-hidden">
                        <span class="material-symbols-outlined text-3xl text-zinc-400">add_a_photo</span>
                    </div>
                    <label class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full cursor-pointer shadow-md hover:scale-105 transition-transform">
                        <span class="material-symbols-outlined text-[16px]">edit</span>
                        <input type="file" accept="image/*" class="hidden" onchange="previewOnboardingAvatar(event)">
                    </label>
                </div>
                
                <input type="text" id="ob-player-name" placeholder="Enter Nickname" class="w-full bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 px-4 py-3.5 rounded-2xl font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none text-center select-text transition-colors">
                
                <button onclick="vibe(); saveUserProfile()" class="w-full mt-2 bg-primary text-white py-3.5 rounded-2xl font-semibold shadow-md shadow-primary/20 hover:bg-primary-dark active:scale-95 transition-all">Start Playing</button>
                <button onclick="vibe(); toggleRestoreView(true)" class="mt-3 text-sm text-zinc-500 font-medium hover:text-primary transition-colors">Already have an account? Restore ID</button>
            </div>

            <!-- View: Restore Profile by ID -->
            <div id="view-restore-profile" class="hidden flex-col gap-4 items-center">
                <div class="w-16 h-16 rounded-2xl bg-zinc-100 dark:bg-zinc-800 text-zinc-500 flex items-center justify-center mb-2">
                    <span class="material-symbols-outlined text-4xl">manage_search</span>
                </div>
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-white text-center">Restore Account</h2>
                <p class="text-zinc-500 text-sm text-center mb-4">Enter your unique ID to restore your stats and previous matches.</p>
                
                <input type="text" id="restore-id-input" placeholder="Paste ID here..." class="w-full bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 px-4 py-4 rounded-2xl font-mono text-sm focus:border-primary outline-none text-center select-text transition-colors">
                
                <button onclick="vibe(); restoreAccount()" class="w-full mt-2 bg-zinc-900 dark:bg-white dark:text-zinc-900 text-white py-3.5 rounded-2xl font-semibold shadow-md active:scale-95 transition-all">Confirm & Restore</button>
                <button onclick="vibe(); toggleRestoreView(false)" class="mt-3 text-sm text-zinc-500 font-medium hover:text-primary transition-colors">Back to Create Account</button>
            </div>

        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc, orderBy, query, updateDoc, increment, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* --- FIREBASE CONFIGURATION --- */
        const firebaseConfig = {
            apiKey: "AIzaSyAiX6ipa161rB1o715EfmtzfrHiz9zgChQ",
            authDomain: "dottech-scorat.firebaseapp.com",
            projectId: "dottech-scorat",
            storageBucket: "dottech-scorat.firebasestorage.app",
            messagingSenderId: "324240314924",
            appId: "1:324240314924:web:12866f2c25908f82fb7789",
            measurementId: "G-Y945QFFG3G"
        };

        const appId = 'scorat-app'; 
        let db, auth, currentUser;

        /* --- Game Modes Config --- */
        const GAME_MODES = {
            'concan': { name: 'Concan (Partner)', teams: 2, win: 'lowest', target: true, t1: 351, t2: 551 },
            'tarneeb41': { name: 'Tarneeb 41', teams: 2, win: 'highest', target: true, t1: 31, t2: 41 },
            'trix_partner': { name: 'Trix (Partner)', teams: 2, win: 'highest', target: false, t1: 0, t2: 0 },
            'trix_complex': { name: 'Trix Complex', teams: 2, win: 'highest', target: false, t1: 0, t2: 0 },
            'trix_individual': { name: 'Trix Individual', teams: 4, win: 'highest', target: false, t1: 0, t2: 0 }
        };
        
        /* --- Global State --- */
        const state = {
            currentTab: 'main',
            settings: { haptics: true, notifications: false, gameMode: 'concan', m1: 351, m2: 551, darkMode: false },
            players: [], history: [], liveGames: [],
            spectatingMatchId: null, hostChatData: [],
            activeGame: { mode: 'concan', team1: [null, null], team2: [null, null], team3: [], team4: [], rounds: [], m1Triggered: false, m2Triggered: false, gameOver: false },
            tempHistoryId: null, lastActiveState: null, notifiedGames: new Set()
        };
        window.state = state;

        let debounceTimer; let onboardingAvatarBase64 = null;
        let isLocalUpdate = false; let localUpdateTimeout = null;
        
        // Listeners Cleanup References
        let unsubActiveGame = null; let unsubUsers = null; let unsubHistory = null; let unsubLiveList = null;
        let unsubLiveGame = null; let unsubLiveChat = null; let unsubHostChat = null;

        window.getActiveUid = function() { return localStorage.getItem('scorat_uid') || (currentUser ? currentUser.uid : null); };

        /* --- Match Result Engine --- */
        window.getMatchResult = function(gameData) {
            const mode = gameData.mode || 'concan';
            const md = GAME_MODES[mode] || GAME_MODES['concan'];
            const isInd = md.teams === 4;
            let s = { 1: 0, 2: 0, 3: 0, 4: 0 };
            
            (gameData.rounds || []).forEach(r => {
                s[1] += (r.t1||0); s[2] += (r.t2||0);
                if (isInd) { s[3] += (r.t3||0); s[4] += (r.t4||0); }
            });
            
            let scores = [ {t: 1, v: s[1]}, {t: 2, v: s[2]} ];
            if (isInd) scores.push({t: 3, v: s[3]}, {t: 4, v: s[4]});
            
            scores.sort((a,b) => md.win === 'lowest' ? a.v - b.v : b.v - a.v);
            return { scoresObj: s, winnerT: scores[0].t, leaderboard: scores, isInd, md };
        }

        /* --- UI Logic Utilities --- */
        function getTeamName(teamIds, defaultName) {
            if (!teamIds || teamIds.length === 0 || !teamIds[0]) return defaultName;
            const names = teamIds.filter(id => id).map(id => {
                const p = state.players.find(x => x.id === id); return p ? p.name : '';
            });
            return names.length > 0 ? names.join(' + ') : defaultName;
        }

        /* --- PWA Setup --- */
        let deferredPrompt;
        const manifest = { "name": "Scorat", "short_name": "Scorat", "start_url": ".", "display": "standalone", "background_color": "#ffffff", "theme_color": "#2563eb", "icons": [{ "src": "./logo.png", "sizes": "512x512", "type": "image/png+xml", "purpose": "any maskable" }] };
        const manifestLink = document.createElement('link'); manifestLink.rel = 'manifest'; 
        manifestLink.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(manifestLink);

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            setTimeout(() => { if (document.getElementById('toast-container')) { showToast("Install Scorat App to Home Screen", "Install", () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } }); } }, 3000);
        });

        window.installPWA = function() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } };

        /* --- Initialization --- */
        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                try { await enableIndexedDbPersistence(db); } catch (err) { console.warn("Offline persistence failed", err); }
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => { if (user) { currentUser = user; await checkUserProfile(getActiveUid()); } });
            } catch (error) { console.error("Firebase Init Error:", error); showToast("Failed to connect.", "error"); }
            bindEvents();
        }

        window.vibe = function(ms = 40) { if (navigator.vibrate && state.settings.haptics) navigator.vibrate(ms); };

        function sendPushNotification(title, body) {
            if (state.settings.notifications && Notification.permission === 'granted') { new Notification(title, { body }); }
        }

        /* --- Auth / Restore Methods --- */
        async function checkUserProfile(uid) {
            if(!uid) return;
            try {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid));
                if (!userDoc.exists()) { document.getElementById('onboarding-container').classList.remove('hidden'); } 
                else { document.getElementById('onboarding-container').classList.add('hidden'); setupListeners(); }
            } catch(e) { console.error(e); }
        }

        window.toggleRestoreView = function(showRestore) {
            const vCreate = document.getElementById('view-create-profile');
            const vRestore = document.getElementById('view-restore-profile');
            if (showRestore) { vCreate.classList.add('hidden'); vRestore.classList.remove('hidden'); vRestore.style.display = 'flex'; } 
            else { vRestore.classList.add('hidden'); vRestore.style.display = ''; vCreate.classList.remove('hidden'); }
        }

        window.restoreAccount = async function() {
            const id = document.getElementById('restore-id-input').value.trim();
            if (!id) return showToast("Please enter your ID", "error");
            try {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
                if (userDoc.exists()) { localStorage.setItem('scorat_uid', id); showToast("Account restored!"); setTimeout(() => location.reload(), 1000); } 
                else { showToast("No account found matching this ID", "error"); }
            } catch (e) { showToast("Connection error", "error"); }
        }

        window.previewOnboardingAvatar = function(e) {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 150; let w = img.width; let h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } } else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    onboardingAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('ob-avatar-preview').innerHTML = `<img src="${onboardingAvatarBase64}" class="w-full h-full object-cover">`;
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        }

        window.saveUserProfile = async function() {
            const name = document.getElementById('ob-player-name').value.trim(); if (!name) return showToast("Nickname required!");
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), { name, avatar: onboardingAvatarBase64, joinedAt: Date.now(), wins: 0, losses: 0 });
                localStorage.setItem('scorat_uid', currentUser.uid); 
                document.getElementById('onboarding-container').classList.add('hidden'); showToast("Profile created!"); setupListeners();
            } catch (e) { showToast("Error creating profile.", "error"); }
        }

        /* --- Listeners --- */
        function setupListeners() {
            const uid = getActiveUid(); if (!uid) return;

            // Prevent memory leaks by cleaning up previous listeners
            if (unsubActiveGame) unsubActiveGame();
            if (unsubUsers) unsubUsers();
            if (unsubHistory) unsubHistory();
            if (unsubLiveList) unsubLiveList();

            const sStr = localStorage.getItem('scorat_settings');
            if(sStr) state.settings = { ...state.settings, ...JSON.parse(sStr) };
            if(!state.settings.gameMode) state.settings.gameMode = 'concan';

            unsubActiveGame = onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), (snap) => {
                if (snap.exists()) { 
                    // Prevent focus loss: Do not re-render if the user is currently typing
                    if (isLocalUpdate) return;
                    
                    state.activeGame = snap.data();
                    if(!state.activeGame.mode) state.activeGame.mode = 'concan';
                    if(!state.activeGame.team3) state.activeGame.team3 = [];
                    if(!state.activeGame.team4) state.activeGame.team4 = [];
                    checkMilestones(); 
                } else { window.applyModeChange(state.settings.gameMode, true); }
                
                // Only render if we are not actively typing
                if (state.currentTab === 'main' && !isLocalUpdate) renderMain();
            });

            unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                state.players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (['players', 'main', 'history', 'stats', 'leaderboard'].includes(state.currentTab)) renderActiveTab();
            });

            unsubHistory = onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'history'), (snap) => {
                state.history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.date - a.date);
                if (['history', 'stats'].includes(state.currentTab)) renderActiveTab();
            });

            unsubLiveList = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'liveGames'), (snap) => {
                const games = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                state.liveGames = games.filter(g => g.id !== uid);
                
                state.liveGames.forEach(g => {
                    if (!state.notifiedGames.has(g.id)) {
                        state.notifiedGames.add(g.id);
                        const isCoop = (g.game.team1||[]).includes(uid) || (g.game.team2||[]).includes(uid) || (g.game.team3||[]).includes(uid) || (g.game.team4||[]).includes(uid);
                        if (isCoop) sendPushNotification("Joined Match", `${g.hostName} is hosting a game with you.`);
                    }
                });

                document.getElementById('live-indicator').classList.toggle('hidden', state.liveGames.length === 0);
                if (state.currentTab === 'live') renderActiveTab();

                const myLiveGame = games.find(g => g.id === uid);
                if (myLiveGame && myLiveGame.updatedBy && myLiveGame.updatedBy !== uid) {
                    state.activeGame = myLiveGame.game; saveActiveGameLocalOnly(); 
                    if(state.currentTab === 'main' && !isLocalUpdate) renderMain();
                }
            });
        }

        /* --- Game & Rules Logic --- */
        window.handleModeChange = function(newMode) {
            if (state.activeGame.rounds && state.activeGame.rounds.length > 0) {
                showModal("Change Game Mode?", `
                    <p class="text-sm text-zinc-500 mb-6 text-center">Changing the mode will clear your current board. Continue?</p>
                    <div class="flex gap-3">
                        <button onclick="closeModal(); renderActiveTab();" class="flex-1 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 py-3.5 rounded-xl font-semibold">Cancel</button>
                        <button onclick="applyModeChange('${newMode}')" class="flex-1 bg-red-500 text-white py-3.5 rounded-xl font-semibold shadow-md active:scale-95">Reset</button>
                    </div>
                `);
            } else { applyModeChange(newMode); }
        }

        window.applyModeChange = function(newMode, silent = false) {
            closeModal(); state.settings.gameMode = newMode; const md = GAME_MODES[newMode];
            if (md.target) { state.settings.m1 = md.t1; state.settings.m2 = md.t2; }

            const isInd = md.teams === 4;
            state.activeGame = { 
                mode: newMode, team1: isInd ? [null] : [null, null], team2: isInd ? [null] : [null, null], 
                team3: isInd ? [null] : [], team4: isInd ? [null] : [], rounds: [], m1Triggered: false, m2Triggered: false, gameOver: false 
            };
            
            saveSettings(); saveActiveGame();
            if(!silent) { showToast("Mode changed to " + md.name); renderActiveTab(); }
        }

        function saveActiveGame() {
            const uid = getActiveUid(); if (!uid) return; 
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                setDoc(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), state.activeGame).catch(e=>console.error(e));
                const liveRef = doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', uid);
                if (state.activeGame.rounds && state.activeGame.rounds.length > 0 && !state.activeGame.gameOver) {
                    setDoc(liveRef, { hostId: uid, hostName: state.players.find(p => p.id === uid)?.name || 'Player', game: state.activeGame, updatedAt: Date.now(), updatedBy: uid });
                } else deleteDoc(liveRef).catch(()=>{});
            }, 300);
        }

        function saveActiveGameLocalOnly() {
            const uid = getActiveUid(); if (!uid) return;
            setDoc(doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame'), state.activeGame).catch(e=>console.error(e));
        }

        window.saveSettings = function() {
            localStorage.setItem('scorat_settings', JSON.stringify(state.settings));
            if(state.settings.notifications && Notification.permission !== 'granted') Notification.requestPermission();
        }

        function checkMilestones() {
            const md = GAME_MODES[state.activeGame.mode || 'concan'];
            if (!md.target) return;
            
            const res = getMatchResult(state.activeGame);
            const topScore = res.leaderboard[0].v;
            const { m1, m2 } = state.settings;
            let maxScore = res.leaderboard[res.leaderboard.length - 1].v;
            
            if (md.win === 'lowest') {
                if (maxScore >= m1 && !state.activeGame.m1Triggered) { state.activeGame.m1Triggered = true; playAlertSound('m1'); saveActiveGame(); }
                if (maxScore >= m2 && !state.activeGame.gameOver) { state.activeGame.m2Triggered = true; state.activeGame.gameOver = true; playAlertSound('m2'); triggerCelebration(); saveActiveGame(); }
            } else {
                if (topScore >= m1 && !state.activeGame.m1Triggered) { state.activeGame.m1Triggered = true; playAlertSound('m1'); saveActiveGame(); }
                if (topScore >= m2 && !state.activeGame.gameOver) { state.activeGame.m2Triggered = true; state.activeGame.gameOver = true; playAlertSound('m2'); triggerCelebration(); saveActiveGame(); }
            }
        }

        window.resetGame = async function() {
            vibe(); const uid = getActiveUid();
            if (!uid || !state.activeGame.rounds || state.activeGame.rounds.length === 0) return showToast("Board is empty.", "error");
            
            state.lastActiveState = JSON.parse(JSON.stringify(state.activeGame)); 
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', uid, 'history'), { 
                date: Date.now(), mode: state.activeGame.mode || 'concan', team1: state.activeGame.team1 || [], 
                team2: state.activeGame.team2 || [], team3: state.activeGame.team3 || [], team4: state.activeGame.team4 || [],
                rounds: state.activeGame.rounds 
            });
            state.tempHistoryId = docRef.id;

            const res = getMatchResult(state.activeGame);
            const updateStats = async (teamArr, won) => { 
                for (const pid of teamArr) { if (pid) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', pid), { wins: increment(won ? 1 : 0), losses: increment(won ? 0 : 1) }); } catch(e) {} } } 
            };
            
            await updateStats(state.activeGame.team1, res.winnerT === 1); await updateStats(state.activeGame.team2, res.winnerT === 2);
            if(res.isInd) { await updateStats(state.activeGame.team3, res.winnerT === 3); await updateStats(state.activeGame.team4, res.winnerT === 4); }

            applyModeChange(state.settings.gameMode, true);
            deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', uid)).catch(()=>{});
            showToast("Game saved & cleared.", "Undo", undoReset);
        }

        async function undoReset() {
            const uid = getActiveUid();
            if (!uid || !state.lastActiveState || !state.tempHistoryId) return;
            
            const res = getMatchResult(state.lastActiveState);
            const revertStats = async (teamArr, won) => { 
                for (const pid of teamArr) { if (pid) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', pid), { wins: increment(won ? -1 : 0), losses: increment(won ? 0 : -1) }); } catch(e) {} } } 
            };
            
            await revertStats(state.lastActiveState.team1, res.winnerT === 1); await revertStats(state.lastActiveState.team2, res.winnerT === 2);
            if(res.isInd) { await revertStats(state.lastActiveState.team3, res.winnerT === 3); await revertStats(state.lastActiveState.team4, res.winnerT === 4); }
            
            state.activeGame = state.lastActiveState; saveActiveGame();
            await deleteDoc(doc(db, 'artifacts', appId, 'users', uid, 'history', state.tempHistoryId));
            state.tempHistoryId = null; state.lastActiveState = null; showToast("Reset undone.");
        }

        /* --- Trix Calculator Logic --- */
        window.openTrixCalculator = function() {
            const mode = state.activeGame.mode;
            const isComplex = mode === 'trix_complex';

            // Filter to find only valid Trix rounds (ignoring manual empty rounds)
            const validTrixLabels = ['King', 'Queens', 'Diamonds', 'Slaps', 'Trix', 'Complex'];
            const trixRounds = (state.activeGame.rounds || []).filter(r => validTrixLabels.includes(r.label));
            
            // Determine current Kingdom and played games
            const callsPerKingdom = isComplex ? 2 : 5;
            const kingdomIndex = Math.floor(trixRounds.length / callsPerKingdom);
            const currentKingdomRounds = trixRounds.slice(kingdomIndex * callsPerKingdom);
            const playedLabels = currentKingdomRounds.map(r => r.label);

            let availableOptions = [];
            if (isComplex) {
                if (!playedLabels.includes('Complex')) availableOptions.push({ val: 'complex', text: 'Complex (All Negatives)' });
                if (!playedLabels.includes('Trix')) availableOptions.push({ val: 'trix', text: 'Trix (+200, +150...)' });
            } else {
                if (!playedLabels.includes('King')) availableOptions.push({ val: 'king', text: 'King of Hearts (-75)' });
                if (!playedLabels.includes('Queens')) availableOptions.push({ val: 'queens', text: 'Queens (-25)' });
                if (!playedLabels.includes('Diamonds')) availableOptions.push({ val: 'diamonds', text: 'Diamonds (-10)' });
                if (!playedLabels.includes('Slaps')) availableOptions.push({ val: 'slaps', text: 'Slaps (-15)' });
                if (!playedLabels.includes('Trix')) availableOptions.push({ val: 'trix', text: 'Trix (+200, +150...)' });
            }

            let gameOptions = '';
            let disabledState = '';
            
            if (availableOptions.length === 0) {
                gameOptions = `<option value="">Kingdom Complete!</option>`;
                disabledState = 'disabled';
            } else {
                gameOptions = availableOptions.map(opt => `<option value="${opt.val}">${opt.text}</option>`).join('');
            }

            const kingdomText = (kingdomIndex < 4) ? `Kingdom ${kingdomIndex + 1} / 4` : `Extra Kingdom ${kingdomIndex + 1}`;

            showModal("👑 Smart Calculator", `
                <div class="flex-1 overflow-y-auto max-h-[60vh] pb-4 pr-1">
                    <div class="mb-5">
                        <div class="flex justify-between items-center mb-2">

        window.calculateAndAddTrix = function() {
            const type = document.getElementById('trix-calc-type').value;
            const labelsMap = {king: 'King', queens: 'Queens', diamonds: 'Diamonds', slaps: 'Slaps', trix: 'Trix', complex: 'Complex'};
            const typeLabel = labelsMap[type]; 
            const mode = state.activeGame.mode;
            const isInd = mode === 'trix_individual';
            const ids = isInd ? ['t1', 't2', 't3', 't4'] : ['t1', 't2'];
            
            let scores = { t1: 0, t2: 0, t3: 0, t4: 0 };
            const addScore = (id, pts) => { scores[id] += pts; };
            const getNum = (key, id) => parseInt(document.getElementById(`trix-${key}-${id}`).value) || 0;
            let errorOccurred = false;

            if (type === 'king' || type === 'complex') {
                const kingEl = document.querySelector('input[name="trix-king"]:checked');
                if (!kingEl && type === 'king') { errorOccurred = true; showToast("Must select who got the King!", "error"); }
                if (!kingEl && type === 'complex') { errorOccurred = true; showToast("Complex: Who got the King?", "error"); }
                
                if(kingEl) {
                    const eater = kingEl.value;
                    const doubler = document.getElementById('trix-king-doubler').value;
                    addScore(eater, -75);
                    if (doubler) { addScore(eater, -75); addScore(doubler, +75); }
                }
            }
            
            if (errorOccurred) return;

            if (['queens', 'complex'].includes(type)) {
                let queensEaten = 0;
                
                for (let i = 1; i <= 4; i++) {
                    const eater = document.getElementById(`trix-queen-eater-${i}`).value;
                    const doubler = document.getElementById(`trix-queen-doubler-${i}`).value;
                    
                    if (eater) {
                        queensEaten++;
                        addScore(eater, -25);
                        if (doubler) {
                            addScore(eater, -25); // Additional penalty for eating a doubled queen
                            addScore(doubler, +25); // Reward for the one who doubled it
                        }
                    }
                }

                if (queensEaten !== 4) { 
                    errorOccurred = true; 
                    showToast("Must select who ate all 4 Queens!", "error"); 
                }
            }

            if (['diamonds', 'slaps', 'complex'].includes(type)) {
                const toCheck = type === 'complex' ? ['diamonds', 'slaps'] : [type];
                for (let game of toCheck) {
                    let sum = 0; const pts = game === 'diamonds' ? -10 : -15; const max = 13;
                    ids.forEach(id => { const val = getNum(game, id); sum += val; addScore(id, val * pts); });
                    if (sum !== max) return showToast(`Total ${game} must be exactly 13.`, "error");
                }
            }

            if (type === 'trix') {
                for (let i = 0; i < 4; i++) {
                    const el = document.getElementById(`trix-place-${i}`);
                    if (!el.value) return showToast("Must select a player for all placements.", "error");
                    const pts = [200, 150, 100, 50][i];
                    addScore(el.value, pts);
                }
            }

            let roundObj = { t1: scores.t1, t2: scores.t2, label: typeLabel };
            if (isInd) { roundObj.t3 = scores.t3; roundObj.t4 = scores.t4; }

            state.activeGame.rounds.push(roundObj);
            
            saveActiveGame(); renderMain(); closeModal(); vibe(100); showToast("Round added successfully!");
            setTimeout(() => { const c = document.getElementById('rounds-container'); if (c) c.scrollTop = c.scrollHeight; }, 100);
        }

        window.updateCoopRound = function(index, team, value) {
            const uid = getActiveUid();
            if (!state.spectatingMatchId || !uid) return;
            const liveGameDoc = state.liveGames.find(g => g.id === state.spectatingMatchId);
            if (!liveGameDoc) return;
            
            const gameData = liveGameDoc.game;
            gameData.rounds[index][team] = value === '' ? null : parseInt(value);
            
            let s = { 1: 0, 2: 0, 3: 0, 4: 0 };
            gameData.rounds.forEach(r => { s[1]+=(r.t1||0); s[2]+=(r.t2||0); s[3]+=(r.t3||0); s[4]+=(r.t4||0); });
            for(let i=1; i<=4; i++) { const h = document.getElementById('coop-t'+i); if(h) h.innerText = s[i]; }

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', state.spectatingMatchId), { game: gameData, updatedBy: uid }, { merge: true });
            }, 300);
        }

        window.openPlayerProfile = function(playerId) {
            const uid = getActiveUid();
            const player = state.players.find(p => p.id === playerId); if (!player || !uid) return;
            
            let h2hWins = 0; let h2hLosses = 0; let coopWins = 0; let coopLosses = 0;
            let teammates = {}; 

            state.history.forEach(match => {
                const res = getMatchResult(match);
                const t1 = match.team1 || []; const t2 = match.team2 || []; 
                const t3 = match.team3 || []; const t4 = match.team4 || [];
                
                if (!res.isInd) {
                    if(t1.includes(playerId)) t1.forEach(id => { if(id && id !== playerId) teammates[id] = (teammates[id]||0)+1; });
                    if(t2.includes(playerId)) t2.forEach(id => { if(id && id !== playerId) teammates[id] = (teammates[id]||0)+1; });
                }

                if (playerId !== uid) {
                    const myTeamIdx = t1.includes(uid) ? 1 : (t2.includes(uid) ? 2 : (t3.includes(uid) ? 3 : (t4.includes(uid) ? 4 : 0)));
                    const theirTeamIdx = t1.includes(playerId) ? 1 : (t2.includes(playerId) ? 2 : (t3.includes(playerId) ? 3 : (t4.includes(playerId) ? 4 : 0)));
                    
                    if (myTeamIdx === 0 || theirTeamIdx === 0) return; 
                    const iWon = res.winnerT === myTeamIdx;

                    if (myTeamIdx === theirTeamIdx) { if (iWon) coopWins++; else coopLosses++; } 
                    else { if (iWon) h2hWins++; else h2hLosses++; }
                }
            });

            const total = (player.wins||0) + (player.losses||0);
            const rate = total > 0 ? ((player.wins||0) / total * 100).toFixed(0) : 0;
            
            let badges = [];
            if (total >= 10) badges.push({icon: 'shield', label: 'Veteran', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30'});
            if (total >= 5 && rate >= 60) badges.push({icon: 'local_fire_department', label: 'On Fire', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30'});
            if (player.wins >= 50) badges.push({icon: 'trophy', label: 'Champion', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30'});
            
            const topTeammateId = Object.keys(teammates).sort((a,b)=>teammates[b]-teammates[a])[0];
            if(topTeammateId && teammates[topTeammateId] >= 5) {
                badges.push({icon: 'handshake', label: 'Loyal Duo', color: 'text-primary', bg: 'bg-primary-light dark:bg-primary/20'});
            }

            const badgesHtml = badges.length > 0 ? `
                <div class="flex gap-2 justify-center flex-wrap mb-6">
                    ${badges.map(b => `<div class="${b.bg} ${b.color} px-3 py-1.5 rounded-full flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest"><span class="material-symbols-outlined text-[14px]">${b.icon}</span> ${b.label}</div>`).join('')}
                </div>` : '<div class="mb-4"></div>';

            showModal("Player Profile", `
                <div class="flex flex-col items-center">
                    <img src="${player.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + player.name}" class="w-28 h-28 rounded-[2rem] object-cover shadow-lg mb-4 border-4 border-surface-light dark:border-surface-dark">
                    <h3 class="text-3xl font-black text-center mb-2 tracking-tight">${player.name}</h3>
                    ${badgesHtml}
                    <div class="flex gap-4 w-full text-sm bg-background-light dark:bg-background-dark p-4 rounded-3xl mb-6">
                        <div class="flex-1 text-center bg-surface-light dark:bg-surface-dark p-3 rounded-2xl shadow-sm"><div class="font-black text-2xl text-primary">${player.wins || 0}</div><div class="text-[9px] uppercase text-zinc-400 font-bold mt-1">Wins</div></div>
                        <div class="flex-1 text-center bg-surface-light dark:bg-surface-dark p-3 rounded-2xl shadow-sm"><div class="font-black text-2xl text-rose-500">${player.losses || 0}</div><div class="text-[9px] uppercase text-zinc-400 font-bold mt-1">Losses</div></div>
                        <div class="flex-1 text-center bg-surface-light dark:bg-surface-dark p-3 rounded-2xl shadow-sm"><div class="font-black text-2xl">${rate}%</div><div class="text-[9px] uppercase text-zinc-400 font-bold mt-1">Win Rate</div></div>
                    </div>
                </div>
                ${playerId !== uid ? `
                <div class="bg-surface-light dark:bg-surface-dark rounded-3xl p-5 border border-zinc-100 dark:border-zinc-800 shadow-sm">
                    <h4 class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-4 flex items-center gap-1.5"><span class="material-symbols-outlined text-[16px]">compare_arrows</span> Head-to-Head vs You</h4>
                    <div class="flex justify-between items-center bg-background-light dark:bg-background-dark p-3.5 rounded-2xl mb-2">
                        <span class="text-sm font-semibold">As Opponents</span><div class="font-bold text-sm"><span class="text-primary">${h2hWins}W</span> <span class="text-zinc-300 mx-1">|</span> <span class="text-rose-500">${h2hLosses}L</span></div>
                    </div>
                    <div class="flex justify-between items-center bg-background-light dark:bg-background-dark p-3.5 rounded-2xl">
                        <span class="text-sm font-semibold">As Teammates</span><div class="font-bold text-sm"><span class="text-primary">${coopWins}W</span> <span class="text-zinc-300 mx-1">|</span> <span class="text-rose-500">${coopLosses}L</span></div>
                    </div>
                </div>` : ''}

                    <div class="bg-surface-light dark:bg-surface-dark p-6 rounded-3xl shadow-soft border border-zinc-100 dark:border-zinc-800">
                        <h3 class="text-[10px] font-bold uppercase text-zinc-400 mb-5 tracking-widest flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">account_box</span> Account</h3>
                        <div class="flex justify-between items-center mb-4 bg-background-light dark:bg-background-dark p-4 rounded-2xl border border-zinc-100 dark:border-zinc-800">
                            <div class="flex flex-col"><span class="font-bold text-sm text-zinc-800 dark:text-white">Your ID</span><span class="text-[10px] text-zinc-400 mt-1 font-mono">${getActiveUid()}</span></div>
                            <button onclick="vibe(); copyMyId()" class="bg-white dark:bg-zinc-700 p-2.5 rounded-xl shadow-sm active:scale-95 transition-transform"><span class="material-symbols-outlined text-[18px]">content_copy</span></button>
                        </div>
                        <button onclick="vibe(); logoutAccount()" class="w-full bg-rose-50 dark:bg-rose-900/20 text-rose-500 py-3.5 rounded-2xl text-sm font-bold hover:bg-rose-100 transition-colors">Log Out / Switch Account</button>
                    </div>

                    <div class="bg-surface-light dark:bg-surface-dark p-6 rounded-3xl shadow-soft border border-zinc-100 dark:border-zinc-800">
                        <h3 class="text-[10px] font-bold uppercase text-zinc-400 mb-5 tracking-widest flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">palette</span> Appearance</h3>
                        
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-semibold text-sm flex items-center gap-2">Dark Mode</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.darkMode ? 'checked' : ''} onchange="vibe(); state.settings.darkMode=this.checked; updateThemeLogic();">
                                <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary border border-transparent"></div>
                            </label>
                        </div>

                        <div>
                            <span class="font-semibold text-sm block mb-3">Theme Color</span>
                            <div class="flex gap-4">
                                <button onclick="vibe(); changeColor('blue')" class="w-12 h-12 rounded-2xl bg-[#2563eb] shadow-sm active:scale-90 transition-transform focus:ring-4 focus:ring-blue-200"></button>
                                <button onclick="vibe(); changeColor('emerald')" class="w-12 h-12 rounded-2xl bg-[#10b981] shadow-sm active:scale-90 transition-transform focus:ring-4 focus:ring-emerald-200"></button>
                                <button onclick="vibe(); changeColor('purple')" class="w-12 h-12 rounded-2xl bg-[#8b5cf6] shadow-sm active:scale-90 transition-transform focus:ring-4 focus:ring-purple-200"></button>
                                <button onclick="vibe(); changeColor('rose')" class="w-12 h-12 rounded-2xl bg-[#f43f5e] shadow-sm active:scale-90 transition-transform focus:ring-4 focus:ring-rose-200"></button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-surface-light dark:bg-surface-dark p-6 rounded-3xl shadow-soft border border-zinc-100 dark:border-zinc-800">
                        <h3 class="text-[10px] font-bold uppercase text-zinc-400 mb-5 tracking-widest flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">tune</span> Device</h3>
                        
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-semibold text-sm">Haptic Feedback</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.haptics ? 'checked' : ''} onchange="state.settings.haptics=this.checked; vibe(); saveSettings();">
                                <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary border border-transparent"></div>
                            </label>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div class="flex flex-col"><span class="font-semibold text-sm">Push Notifications</span><span class="text-[10px] text-zinc-400 mt-1">Get alerts for live matches</span></div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state.settings.notifications ? 'checked' : ''} onchange="vibe(); state.settings.notifications=this.checked; saveSettings();">
                                <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary border border-transparent"></div>
                            </label>
                        </div>
                    </div>

                </div>
            `;
        }

        window.updateThemeLogic = function() {
            localStorage.setItem('scorat_theme', state.settings.darkMode ? 'dark' : 'light');
            if (state.settings.darkMode) {
                document.documentElement.classList.add('dark');
                document.getElementById('meta-theme-color').setAttribute('content', '#09090b');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('meta-theme-color').setAttribute('content', '#ffffff');
            }
            saveSettings();
        }

        window.changeColor = function(colorName) {
            localStorage.setItem('scorat_color', colorName);
            const c = colors[colorName];
            document.documentElement.style.setProperty('--color-primary', c.primary);
            document.documentElement.style.setProperty('--color-primary-light', c.light);
            document.documentElement.style.setProperty('--color-primary-dark', c.dark);
        }

        /* --- Utilities --- */
        const playAlertSound = (type) => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(type==='m1'?500:800, ctx.currentTime); gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + (type==='m1'?0.4:0.6)); osc.start(); osc.stop(ctx.currentTime + (type==='m1'?0.4:0.6)); } catch(e) {} };
        
        function bindEvents() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', (e) => { const t = e.currentTarget.closest('.nav-btn').dataset.tab; if(t) switchTab(t); }));
            document.getElementById('btn-add-round').addEventListener('click', () => {
                if(state.currentTab !== 'main') switchTab('main');
                const md = GAME_MODES[state.activeGame.mode || 'concan'];
                if(md.teams === 4) state.activeGame.rounds.push({ t1: null, t2: null, t3: null, t4: null, label: null });
                else state.activeGame.rounds.push({ t1: null, t2: null, label: null });
                saveActiveGame(); renderMain();
                setTimeout(() => { const ins = document.querySelectorAll('input[type="number"]'); if(ins.length>0) ins[ins.length - (md.teams === 4 ? 4 : 2)].focus(); }, 100);
            });
            document.getElementById('modal-container').addEventListener('mousedown', (e) => { if(e.target.id === 'modal-container') closeModal(); });
        }

        function showModal(title, content) {
            const container = document.getElementById('modal-container'); const modContent = document.getElementById('modal-content');
            document.getElementById('modal-inner').innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold">${title}</h2><button onclick="closeModal()" class="w-8 h-8 rounded-full bg-background-light dark:bg-background-dark flex items-center justify-center hover:scale-105 active:scale-95 transition-transform"><span class="material-symbols-outlined text-[20px]">close</span></button></div><div>${content}</div>`;
            container.classList.remove('hidden'); setTimeout(() => modContent.classList.remove('translate-y-full'), 10);
        }

        window.closeModal = function() {
            if(unsubHostChat) { unsubHostChat(); unsubHostChat = null; }
            const container = document.getElementById('modal-container'); const modContent = document.getElementById('modal-content');
            modContent.classList.add('translate-y-full'); setTimeout(() => container.classList.add('hidden'), 300);
        }

        window.showToast = function(msg, actionLabel = null, actionCallback = null) {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 px-5 py-4 rounded-2xl shadow-float flex justify-between items-center transform transition-all duration-300 -translate-y-10 opacity-0`;
            let btnHtml = ''; if (actionLabel) { const btnId = 'toast-btn-' + Date.now(); window[btnId] = () => { actionCallback(); toast.remove(); }; btnHtml = `<button onclick="window['${btnId}']()" class="text-primary-light dark:text-primary font-bold uppercase text-[10px] ml-4 tracking-widest hover:underline">${actionLabel}</button>`; }
            toast.innerHTML = `<span class="font-semibold text-sm">${msg}</span>${btnHtml}`; container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('-translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function triggerCelebration() { showToast("Game Over Target Reached!"); }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
