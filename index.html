    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* --- Global State --- */
        let db, auth, currentUser, appId;
        const state = {
            currentTab: 'main',
            settings: { darkMode: true, m1: 351, m2: 551, m1Audio: null, m2Audio: null },
            players: [],
            history: [],
            activeGame: {
                team1: [null, null], 
                team2: [null, null], 
                rounds: [], 
                m1Triggered: false, 
                m2Triggered: false,
                gameOver: false
            },
            tempHistoryId: null, // For undo
            lastActiveState: null // For undo
        };

        let debounceTimer;
        let onboardingAvatarBase64 = null;

        /* --- Initialization --- */
        async function init() {
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                const firebaseConfig = JSON.parse(configStr);
                
                if(!firebaseConfig.projectId) throw new Error("Firebase config missing");

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'scorat-app-id';

                // Auth First Rule
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        await checkUserProfile(user.uid);
                    }
                });
            } catch (error) {
                console.error("Firebase Init Error:", error);
                showToast("Failed to connect to database. Operating locally.");
            }
            bindEvents();
        }

        async function checkUserProfile(uid) {
            try {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid));
                if (!userDoc.exists()) {
                    document.getElementById('onboarding-container').classList.remove('hidden');
                } else {
                    document.getElementById('onboarding-container').classList.add('hidden');
                    setupListeners();
                }
            } catch(e) {
                console.error("Error checking profile", e);
            }
        }

        window.previewOnboardingAvatar = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 150;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    onboardingAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('ob-avatar-preview').innerHTML = `<img src="${onboardingAvatarBase64}" class="w-full h-full object-cover">`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveUserProfile = async function() {
            const name = document.getElementById('ob-player-name').value.trim();
            if (!name) return showToast("Nickname is required!");
            
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid);
                await setDoc(userRef, {
                    name,
                    avatar: onboardingAvatarBase64,
                    joinedAt: Date.now()
                });
                document.getElementById('onboarding-container').classList.add('hidden');
                showToast("Profile created successfully!");
                setupListeners();
            } catch (error) {
                console.error("Error saving profile", error);
                showToast("Error creating profile.");
            }
        }

        /* --- Database Listeners (Strict Paths) --- */
        function setupListeners() {
            if (!currentUser) return;
            const uid = currentUser.uid;

            // 1. Settings
            const settingsRef = doc(db, 'artifacts', appId, 'users', uid, 'state', 'settings');
            onSnapshot(settingsRef, (snap) => {
                if (snap.exists()) {
                    state.settings = { ...state.settings, ...snap.data() };
                    applyTheme(state.settings.darkMode);
                } else {
                    setDoc(settingsRef, state.settings);
                }
                renderActiveTab();
            }, (err) => console.error("Settings listener error", err));

            // 2. Active Game
            const activeRef = doc(db, 'artifacts', appId, 'users', uid, 'state', 'activeGame');
            onSnapshot(activeRef, (snap) => {
                if (snap.exists()) {
                    state.activeGame = snap.data();
                    checkMilestones(); // Audio checks
                } else {
                    setDoc(activeRef, state.activeGame);
                }
                if (state.currentTab === 'main') renderMain();
            }, (err) => console.error("ActiveGame listener error", err));

            // 3. Players (Now reading from PUBLIC registered users)
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            onSnapshot(playersRef, (snap) => {
                state.players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (['players', 'main', 'history', 'stats'].includes(state.currentTab)) renderActiveTab();
            }, (err) => console.error("Players listener error", err));

            // 4. History
            const historyRef = collection(db, 'artifacts', appId, 'users', uid, 'history');
            onSnapshot(historyRef, (snap) => {
                // Sorting manually in JS to avoid index requirement errors
                state.history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.date - a.date);
                if (['history', 'stats'].includes(state.currentTab)) renderActiveTab();
            }, (err) => console.error("History listener error", err));
        }

        /* --- Core Logic & Database Writes --- */
        function saveActiveGame() {
            if (!currentUser) return;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const activeRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'state', 'activeGame');
                setDoc(activeRef, state.activeGame).catch(e => console.error("Save Active", e));
            }, 300);
        }

        function saveSettings() {
            if (!currentUser) return;
            const settingsRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'state', 'settings');
            setDoc(settingsRef, state.settings).catch(e => console.error("Save Settings", e));
            applyTheme(state.settings.darkMode);
        }

        function checkMilestones() {
            let t1Total = 0; let t2Total = 0;
            (state.activeGame.rounds || []).forEach(r => {
                t1Total += (parseInt(r.t1) || 0);
                t2Total += (parseInt(r.t2) || 0);
            });

            const { m1, m2 } = state.settings;
            
            // Check M1
            if ((t1Total >= m1 || t2Total >= m1) && !state.activeGame.m1Triggered) {
                state.activeGame.m1Triggered = true;
                playAlertSound('m1');
                saveActiveGame();
            }

            // Check M2 (Game Over)
            if ((t1Total >= m2 || t2Total >= m2) && !state.activeGame.gameOver) {
                state.activeGame.m2Triggered = true;
                state.activeGame.gameOver = true;
                playAlertSound('m2');
                triggerCelebration();
                saveActiveGame();
            }
        }

        async function resetGame() {
            if (!currentUser) return;
            
            // Validate if there's anything to reset
            if (!state.activeGame.rounds || state.activeGame.rounds.length === 0) {
                showToast("Board is already clear.");
                return;
            }

            state.lastActiveState = JSON.parse(JSON.stringify(state.activeGame)); // Deep copy
            
            // 1. Add to history
            const historyRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history');
            const newHistory = {
                date: Date.now(),
                team1: state.activeGame.team1,
