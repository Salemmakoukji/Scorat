<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorat | Concan</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <!-- Sortable JS للسحب والإفلات -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        const savedTheme = localStorage.getItem('scorat_theme');
        const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        primary: '#2563eb',
                        'primary-light': '#eff6ff',
                        surface: { light: '#ffffff', dark: '#18181b' },
                        background: { light: '#f4f4f5', dark: '#09090b' },
                        table: '#064e3b' 
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        
        .page-enter { animation: fadeSlideUp 0.3s ease-out forwards; }
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Card Styling */
        .card-item {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
            margin-right: -2rem; 
            cursor: pointer;
            position: relative;
            flex-shrink: 0; 
        }
        @media (min-width: 768px) { .card-item { margin-right: -2.5rem; } }
        .card-item:last-child { margin-right: 0; }
        .card-selected {
            transform: translateY(-20px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.5);
            border: 2px solid #2563eb;
            z-index: 50 !important;
        }

        .meld-card { margin-right: -1.5rem; }
        .meld-card:last-child { margin-right: 0; }

        .wood-border {
            border: 8px solid #78350f;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-background-light text-zinc-900 dark:bg-background-dark dark:text-zinc-100 transition-colors duration-300 h-screen flex flex-col select-none overflow-hidden">

    <!-- اللوبي -->
    <div id="view-lobby" class="max-w-md mx-auto w-full flex-1 flex flex-col pt-10 px-6 page-enter">
        <header class="flex flex-col items-center mb-8 text-center">
            <div class="w-20 h-20 bg-primary text-white rounded-3xl flex items-center justify-center shadow-lg mb-4 transform -rotate-6">
                <span class="material-symbols-outlined text-5xl">playing_cards</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight">الكونكان الطرطوسية</h1>
        </header>

        <div class="bg-surface-light dark:bg-surface-dark p-6 rounded-[32px] shadow-lg border border-zinc-200 dark:border-zinc-800 flex flex-col gap-5">
            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2">اسمك في اللعبة</label>
                <input type="text" id="player-name" placeholder="أدخل اسمك..." class="w-full bg-background-light dark:bg-background-dark border border-zinc-200 dark:border-zinc-800 px-4 py-3.5 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-primary text-center transition-opacity">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2">اختر فريقك</label>
                <select id="player-team" class="w-full bg-background-light dark:bg-background-dark border border-zinc-200 dark:border-zinc-800 px-4 py-3.5 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-primary text-center appearance-none">
                    <option value="A">الفريق الأول (A)</option>
                    <option value="B">الفريق الثاني (B)</option>
                </select>
            </div>
            
            <button onclick="createRoom()" class="w-full bg-primary text-white py-4 rounded-2xl font-black text-lg shadow-md active:scale-95 transition-all">إنشاء غرفة جديدة</button>
            
            <div class="relative flex items-center py-1">
                <div class="flex-grow border-t border-zinc-200 dark:border-zinc-700"></div>
                <span class="flex-shrink-0 mx-4 text-zinc-400 text-xs font-bold uppercase">أو انضم</span>
                <div class="flex-grow border-t border-zinc-200 dark:border-zinc-700"></div>
            </div>

            <div class="flex gap-2">
                <input type="number" id="room-code-input" placeholder="كود الغرفة..." class="flex-1 bg-background-light dark:bg-background-dark border border-zinc-200 dark:border-zinc-800 px-4 py-3.5 rounded-2xl font-black text-center tracking-widest outline-none focus:ring-2 focus:ring-zinc-400">
                <button onclick="joinRoom()" class="bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-900 px-6 py-3.5 rounded-2xl font-black shadow-md active:scale-95 transition-all">دخول</button>
            </div>
            <div id="lobby-status" class="text-center text-rose-500 font-bold text-sm hidden"></div>
        </div>
    </div>

    <!-- الانتظار -->
    <div id="view-waiting" class="hidden max-w-md mx-auto w-full flex-1 flex-col items-center justify-center px-6 page-enter">
        <div class="bg-surface-light dark:bg-surface-dark p-8 rounded-[32px] shadow-lg text-center w-full border border-zinc-200 dark:border-zinc-800">
            <h2 class="text-xl font-black mb-2">غرفة الانتظار</h2>
            <div class="bg-background-light dark:bg-background-dark py-4 rounded-2xl mb-6 border border-zinc-200 dark:border-zinc-800 border-dashed">
                <span id="display-room-code" class="text-5xl font-black tracking-[0.25em] text-primary">----</span>
            </div>
            
            <div class="text-right mb-6">
                <h3 class="text-xs font-bold text-zinc-500 uppercase mb-3">اللاعبون والفرق:</h3>
                <div id="waiting-players-list" class="flex flex-col gap-2"></div>
            </div>

            <button id="btn-start-game" onclick="startGame()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-lg shadow-md active:scale-95 transition-all mb-4 hidden">بدء الجولة وتوزيع الورق</button>
            <button onclick="exitGame()" class="text-rose-500 font-bold active:scale-95 transition-transform hover:underline text-sm">مغادرة الغرفة</button>
        </div>
    </div>

    <!-- طاولة اللعب -->
    <div id="view-game" class="hidden flex-1 flex-col bg-zinc-900 w-full h-full relative">
        <header class="bg-zinc-950 p-2 flex justify-between items-center z-20 shadow-md border-b border-zinc-800">
            <div class="flex items-center gap-2">
                <button onclick="exitGame()" class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-300 flex items-center justify-center active:scale-95"><span class="material-symbols-outlined text-[18px]">close</span></button>
            </div>
            <div id="opponents-area" class="flex gap-2" dir="ltr"></div>
        </header>

        <div class="flex-1 bg-table wood-border relative overflow-hidden flex flex-col">
            
            <!-- شرط النزول اللحظي -->
            <div class="absolute top-2 left-2 bg-black/50 text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 z-10 flex flex-col">
                <span class="text-[9px] text-zinc-400">شرط النزول (خصم / شريك):</span>
                <span id="taliya-indicator" class="text-yellow-400">51 / 51</span>
            </div>

            <div id="table-melds" class="flex-1 p-4 overflow-y-auto flex flex-wrap content-start gap-6 pb-24 z-0"></div>

            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center gap-6 md:gap-8 z-10 bg-black/40 p-3 md:p-4 rounded-3xl backdrop-blur-sm border border-white/10 shadow-2xl">
                <div class="flex flex-col items-center">
                    <div onclick="drawFromDeck()" class="relative w-16 h-24 md:w-20 md:h-32 rounded-lg bg-indigo-900 border-2 border-white/50 cursor-pointer hover:-translate-y-2 transition-transform shadow-lg flex items-center justify-center" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,.1) 5px, rgba(255,255,255,.1) 10px);">
                        <span class="material-symbols-outlined text-white/50 text-3xl pointer-events-none">playing_cards</span>
                        <div class="absolute -top-3 -right-3 bg-zinc-900 text-white text-[10px] px-2 py-0.5 rounded-full font-bold border border-zinc-700 pointer-events-none" id="deck-count">104</div>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <div id="discard-pile" onclick="drawFromDiscard()" class="relative w-16 h-24 md:w-20 md:h-32 rounded-lg border-2 border-dashed border-white/30 cursor-pointer hover:-translate-y-2 transition-transform flex items-center justify-center overflow-hidden bg-white shadow-lg">
                        <span class="text-zinc-400 text-xs font-bold pointer-events-none">فارغ</span>
                    </div>
                </div>
            </div>

            <div id="turn-indicator" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-zinc-900 px-6 py-1.5 rounded-full font-black text-sm shadow-lg z-20 transition-all duration-300">دورك الآن!</div>
        </div>

        <!-- منطقة اللاعب -->
        <div class="h-56 md:h-64 bg-zinc-900 flex flex-col z-20 border-t border-zinc-800 pb-2 relative">
            
            <div id="selection-points-badge" class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md hidden border border-blue-400 z-30">
                مجموع التحديد: <span id="selection-points-val">0</span>
            </div>

            <!-- الأزرار -->
            <div class="flex justify-center gap-2 py-2 px-2 bg-zinc-950 flex-wrap">
                <button id="btn-undo" onclick="undoAction()" class="flex-1 bg-amber-600 hover:bg-amber-500 text-white py-2 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-all items-center justify-center gap-1 hidden">
                    <span class="material-symbols-outlined text-[18px]">undo</span> تراجع
                </button>
                <button id="btn-meld" onclick="meldSelectedCards()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl font-bold text-sm shadow-md active:scale-95 disabled:opacity-30 disabled:active:scale-100 transition-all flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">publish</span> إنزال
                </button>
                <button id="btn-add-meld" onclick="addToExistingMeld()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-xl font-bold text-sm shadow-md active:scale-95 disabled:opacity-30 disabled:active:scale-100 transition-all flex items-center justify-center gap-1 hidden">
                    <span class="material-symbols-outlined text-[18px]">library_add</span> تركيب
                </button>
                <button id="btn-discard" onclick="discardSelectedCard()" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-2 rounded-xl font-bold text-sm shadow-md active:scale-95 disabled:opacity-30 disabled:active:scale-100 transition-all flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">lock</span> قفل / رمي
                </button>
            </div>
            
            <div class="flex-1 overflow-x-auto overflow-y-visible flex items-center px-6 pt-6 pb-2" id="my-hand" dir="ltr"></div>
        </div>
    </div>

    <!-- جدول النتائج (Scoreboard) -->
    <div id="game-scoreboard" class="absolute inset-0 z-50 bg-black/95 backdrop-blur-md hidden flex-col items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md rounded-[32px] shadow-2xl border border-zinc-700 overflow-hidden flex flex-col">
            <div class="bg-zinc-800 p-6 text-center border-b border-zinc-700">
                <span class="material-symbols-outlined text-5xl text-yellow-500 mb-2">emoji_events</span>
                <h2 id="sb-title" class="text-2xl font-black text-white">نهاية الجولة</h2>
                <p id="sb-subtitle" class="text-sm text-zinc-400 mt-1">النتائج</p>
            </div>
            <div class="p-6">
                <div id="sb-players-list" class="flex flex-col gap-3"></div>
            </div>
            <div class="p-4 bg-zinc-950 flex gap-2">
                <button id="btn-next-round" onclick="startGame()" class="flex-1 bg-primary text-white py-3.5 rounded-xl font-bold active:scale-95 hidden">توزيع جديد</button>
                <button onclick="exitGame()" class="flex-1 bg-zinc-800 text-white py-3.5 rounded-xl font-bold active:scale-95">خروج للوبي</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiX6ipa161rB1o715EfmtzfrHiz9zgChQ",
            authDomain: "dottech-scorat.firebaseapp.com",
            projectId: "dottech-scorat",
            storageBucket: "dottech-scorat.firebasestorage.app",
            messagingSenderId: "324240314924",
            appId: "1:324240314924:web:12866f2c25908f82fb7789"
        };

        const appId = 'scorat-concan';
        const mainAppId = 'scorat-app';
        let db, auth, currentUser;

        let currentRoomCode = null;
        let unsubRoom = null;
        let myPlayerId = localStorage.getItem('scorat_uid');
        let myName = '';
        let roomState = null;
        
        let selectedCards = []; // نستخدم الـ (Index) للحفاظ على فرادة التحديد
        let hasDrawnThisTurn = false;
        let undoStack = []; 
        let handSortable = null; 

        window.vibe = function(ms = 30) { if (navigator.vibrate) navigator.vibrate(ms); };

        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async user => { 
                    if(user) { 
                        currentUser = user; 
                        if (!myPlayerId) myPlayerId = user.uid; 
                        if (myPlayerId) {
                            try {
                                const userDoc = await getDoc(doc(db, 'artifacts', mainAppId, 'public', 'data', 'users', myPlayerId));
                                if (userDoc.exists()) {
                                    myName = userDoc.data().name;
                                    document.getElementById('player-name').value = myName;
                                    document.getElementById('player-name').disabled = true;
                                    document.getElementById('player-name').classList.add('opacity-70', 'cursor-not-allowed');
                                }
                            } catch(e) { }
                        }
                    } 
                });
            } catch (error) { console.error("Init Error:", error); }
        }
        init();

        /* ==================== 1. نظام الغرف ==================== */
        window.createRoom = async function() {
            vibe();
            const nameInput = document.getElementById('player-name').value.trim();
            const teamInput = document.getElementById('player-team').value;
            if(!nameInput) return alert("الرجاء إدخال اسمك!");
            if(!myPlayerId) return alert("جاري الاتصال بالسيرفر...");
            myName = nameInput;

            const code = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomCode = code;

            const initialData = {
                hostId: myPlayerId,
                status: 'waiting',
                players: [{ uid: myPlayerId, name: myName, team: teamInput, cardCount: 0 }],
                deck: [], discard: [], tableMelds: [],
                turn: myPlayerId,
                hands: { [myPlayerId]: [] },
                scores: { [myPlayerId]: 0 },
                hasMelded: { [myPlayerId]: false },
                highestMeld: 51,
                highestMeldTeam: null,
                roundWinner: null,
                isJokerClose: false
            };

            try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', code), initialData); showWaitingRoom(code); listenToRoom(); } 
            catch (e) { alert("فشل إنشاء الغرفة"); }
        }

        window.joinRoom = async function() {
            vibe();
            const nameInput = document.getElementById('player-name').value.trim();
            const teamInput = document.getElementById('player-team').value;
            if(!nameInput) return alert("الرجاء إدخال اسمك!");
            if(!myPlayerId) return alert("جاري الاتصال...");
            
            const code = document.getElementById('room-code-input').value.trim();
            if(code.length !== 4) return alert("كود الغرفة 4 أرقام");
            myName = nameInput;
            
            const statusEl = document.getElementById('lobby-status');
            statusEl.innerText = 'جاري البحث...'; statusEl.classList.remove('hidden');

            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', code);
                const snap = await getDoc(roomRef);
                if (!snap.exists()) return statusEl.innerText = 'الغرفة غير موجودة!';
                let data = snap.data();
                if (data.status !== 'waiting') return statusEl.innerText = 'اللعب بدأ بالفعل!';
                if (data.players.length >= 4) return statusEl.innerText = 'الغرفة ممتلئة';
                if (data.players.find(p => p.uid === myPlayerId)) return statusEl.innerText = 'أنت متصل بالفعل!';

                let newPlayers = [...data.players, { uid: myPlayerId, name: myName, team: teamInput, cardCount: 0 }];
                let newHands = { ...data.hands, [myPlayerId]: [] };
                let newScores = { ...data.scores, [myPlayerId]: 0 };
                let newMelded = { ...data.hasMelded, [myPlayerId]: false };
                
                await updateDoc(roomRef, { players: newPlayers, hands: newHands, scores: newScores, hasMelded: newMelded });
                currentRoomCode = code; showWaitingRoom(code); listenToRoom();
            } catch (e) { statusEl.innerText = "خطأ في الاتصال"; }
        }

        function showWaitingRoom(code) {
            document.getElementById('display-room-code').innerText = code;
            document.getElementById('view-lobby').classList.add('hidden');
            document.getElementById('view-waiting').classList.remove('hidden', 'flex'); document.getElementById('view-waiting').classList.add('flex');
        }

        window.exitGame = async function() {
            vibe(); if (unsubRoom) unsubRoom();
            if (currentRoomCode && roomState) {
                if (roomState.hostId === myPlayerId) { deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode)).catch(e=>{}); } 
                else if(roomState.status === 'waiting') {
                    let newPlayers = roomState.players.filter(p => p.uid !== myPlayerId);
                    let newHands = { ...roomState.hands }; delete newHands[myPlayerId];
                    let newScores = { ...roomState.scores }; delete newScores[myPlayerId];
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode), { players: newPlayers, hands: newHands, scores: newScores }).catch(e=>{});
                }
            }
            document.getElementById('view-waiting').classList.add('hidden'); document.getElementById('view-waiting').classList.remove('flex');
            document.getElementById('view-game').classList.add('hidden'); document.getElementById('view-game').classList.remove('flex');
            document.getElementById('game-scoreboard').classList.add('hidden'); document.getElementById('game-scoreboard').classList.remove('flex');
            document.getElementById('view-lobby').classList.remove('hidden');
            currentRoomCode = null; roomState = null; selectedCards = []; undoStack = [];
        }

        /* ==================== 2. قواعد البطاقات والكونكان ==================== */
        function generateConcanDeck() {
            const suits = ['h','d','c','s']; const vals = ['2','3','4','5','6','7','8','9','10','j','q','k','a'];
            let deck = [];
            for(let i=0; i<2; i++) { suits.forEach(s => vals.forEach(v => deck.push(v+s))); deck.push('jk'); }
            for(let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
            return deck;
        }

        function getConcanValue(code, inHand = true) {
            if(!code || code === 'back') return 0;
            if(code === 'jk') return inHand ? 25 : 10;
            let val = code.replace(/[hdcs]/g, '');
            if(['a','j','q','k'].includes(val)) return 10;
            return parseInt(val) || 0;
        }

        function calculatePoints(cardArray, inHand = true) {
            let sum = 0;
            cardArray.forEach(c => sum += getConcanValue(c, inHand));
            return sum;
        }

        /* ==================== 3. المزامنة واللعب ==================== */
        function listenToRoom() {
            if (unsubRoom) unsubRoom();
            unsubRoom = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode), (snap) => {
                if (!snap.exists()) { alert("أُغلقت الغرفة."); return exitGame(); }
                roomState = snap.data();
                
                if (roomState.status === 'waiting') renderWaitingRoom();
                else if (roomState.status === 'playing') {
                    document.getElementById('view-waiting').classList.add('hidden'); document.getElementById('view-waiting').classList.remove('flex');
                    document.getElementById('game-scoreboard').classList.add('hidden'); document.getElementById('game-scoreboard').classList.remove('flex');
                    document.getElementById('view-game').classList.remove('hidden'); document.getElementById('view-game').classList.add('flex');
                    renderGameBoard();
                }
                else if (roomState.status === 'round_end') {
                    renderScoreboard();
                }
            });
        }

        function renderWaitingRoom() {
            const list = document.getElementById('waiting-players-list');
            list.innerHTML = roomState.players.map((p) => `
                <div class="bg-background-light dark:bg-background-dark p-3 rounded-xl flex items-center justify-between border border-zinc-200 dark:border-zinc-800">
                    <span class="font-bold flex items-center gap-2"><div class="w-3 h-3 rounded-full ${p.team==='A'?'bg-blue-500':'bg-rose-500'}"></div> ${p.name} ${p.uid===myPlayerId?'(أنت)':''}</span>
                    <span class="text-xs text-zinc-500 font-bold bg-zinc-200 dark:bg-zinc-800 px-2 py-1 rounded">فريق ${p.team}</span>
                </div>
            `).join('');

            const btnStart = document.getElementById('btn-start-game');
            if (myPlayerId === roomState.hostId && roomState.players.length >= 2) btnStart.classList.remove('hidden');
            else btnStart.classList.add('hidden');
        }

        window.startGame = async function() {
            vibe(); 
            if (myPlayerId !== roomState.hostId) return;
            
            try {
                let deck = generateConcanDeck();
                let newHands = {};
                let newPlayers = [...roomState.players];
                let newHasMelded = {};

                // تفريغ الكروت القديمة وتوزيع جديد
                newPlayers.forEach((p, index) => {
                    let count = (index === 0) ? 15 : 14;
                    let pHand = []; 
                    for(let i=0; i<count; i++) pHand.push(deck.pop());
                    newHands[p.uid] = pHand; 
                    p.cardCount = count;
                    newHasMelded[p.uid] = false;
                });

                // تصفير حالة الطاولة
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode), {
                    status: 'playing', 
                    deck: deck, 
                    discard: [], 
                    tableMelds: [], 
                    hands: newHands, 
                    players: newPlayers,
                    turn: newPlayers[0].uid, 
                    hasMelded: newHasMelded, 
                    highestMeld: 51, 
                    highestMeldTeam: null, 
                    roundWinner: null, 
                    isJokerClose: false
                });
            } catch (e) {
                console.error(e);
                alert("حدث خطأ أثناء توزيع الأوراق! حاول مرة أخرى.");
            }
        }

        function getCardHTML(code, isSelected = false, index = null, isOpponent = false) {
            if(!code) return '';
            if (isOpponent) return `<div class="w-6 h-8 bg-blue-800 rounded border border-white/20 shadow-sm" style="margin-right: -10px; background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,.1) 3px, rgba(255,255,255,.1) 6px);"></div>`;
            
            let selClass = isSelected ? 'card-selected' : '';
            let clickAttr = index !== null ? `onclick="window.toggleCardSelect(${index})"` : '';
            
            return `
            <div ${clickAttr} class="w-16 h-24 md:w-20 md:h-32 rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.5)] bg-white border border-zinc-200 dark:border-zinc-700 card-item ${selClass} flex items-center justify-center overflow-hidden" data-id="${code}">
                <span class="absolute inset-0 flex items-center justify-center font-black text-xl text-zinc-300 z-0 select-none pointer-events-none">${code.toUpperCase()}</span>
                <img src="./assets/cards/${code}.png" onerror="this.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10 pointer-events-none select-none">
            </div>`;
        }

        window.toggleCardSelect = function(index) {
            if (index === null || index === undefined) return; vibe(10);
            
            // Toggle selection logic using Index
            const pos = selectedCards.indexOf(index);
            if (pos > -1) selectedCards.splice(pos, 1);
            else selectedCards.push(index);
            
            renderGameBoard(); 
        }

        function renderGameBoard() {
            document.getElementById('game-room-id').innerText = currentRoomCode;
            
            // 1. الخصوم والسكورات
            const oppArea = document.getElementById('opponents-area');
            oppArea.innerHTML = roomState.players.filter(p => p.uid !== myPlayerId).map(p => `
                <div class="flex flex-col items-center bg-black/40 p-1.5 rounded-lg border ${roomState.turn === p.uid ? 'border-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]' : 'border-zinc-800'} relative">
                    <div class="absolute -top-2 -right-2 bg-zinc-900 text-white text-[9px] px-1.5 py-0.5 rounded border border-zinc-700 font-bold">${roomState.scores[p.uid] || 0} pt</div>
                    <span class="text-[10px] font-bold text-white mb-1 flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full ${p.team==='A'?'bg-blue-500':'bg-rose-500'}"></div>${p.name}</span>
                    <div class="flex">${Array(Math.min(p.cardCount, 20)).fill('').map(() => getCardHTML('back', false, null, true)).join('')}</div>
                    <span class="text-[9px] ${roomState.hasMelded[p.uid] ? 'text-emerald-400 font-bold' : 'text-zinc-400'} mt-1">${roomState.hasMelded[p.uid] ? 'نازل' : p.cardCount + ' كروت'}</span>
                </div>
            `).join('');

            // 2. شرط النزول (Ta'liya)
            let myTeam = roomState.players.find(p => p.uid === myPlayerId)?.team;
            let requiredScore = 51;
            if (roomState.highestMeldTeam && roomState.highestMeldTeam !== myTeam) requiredScore = roomState.highestMeld + 1;
            document.getElementById('taliya-indicator').innerText = `${requiredScore} / 51`;

            // 3. الكومة والرمي
            document.getElementById('deck-count').innerText = roomState.deck.length;
            const discardPile = document.getElementById('discard-pile');
            if (roomState.discard.length > 0) {
                let topDiscard = roomState.discard[roomState.discard.length - 1];
                discardPile.innerHTML = `<div class="absolute inset-0 flex items-center justify-center font-black text-zinc-300 text-lg pointer-events-none z-0">${topDiscard.toUpperCase()}</div><img src="./assets/cards/${topDiscard}.png" onerror="this.style.display='none'" class="w-full h-full object-cover rounded-lg shadow-lg relative z-10 pointer-events-none">`;
                discardPile.className = "relative w-16 h-24 md:w-20 md:h-32 rounded-lg cursor-pointer hover:-translate-y-2 transition-transform border border-zinc-400 bg-white overflow-hidden";
            } else {
                discardPile.innerHTML = `<span class="text-zinc-400 text-xs font-bold pointer-events-none">فارغ</span>`;
                discardPile.className = "relative w-16 h-24 md:w-20 md:h-32 rounded-lg border-2 border-dashed border-white/30 cursor-pointer flex items-center justify-center bg-transparent";
            }

            // 4. المجموعات
            document.getElementById('table-melds').innerHTML = roomState.tableMelds.map((meldObj, mIdx) => `
                <div class="flex bg-black/20 p-2 rounded-xl border border-white/10 hover:border-blue-400 cursor-pointer transition-colors shadow-lg" onclick="window.addSelectedToMeld(${mIdx})">
                    ${(meldObj.cards || []).map(card => `
                        <div class="meld-card w-12 h-16 md:w-16 md:h-24 relative bg-white rounded-lg shadow-md border border-zinc-300 flex items-center justify-center overflow-hidden">
                            <span class="absolute text-zinc-300 font-bold select-none pointer-events-none">${card.toUpperCase()}</span>
                            <img src="./assets/cards/${card}.png" onerror="this.style.display='none'" class="w-full h-full object-cover absolute inset-0 z-10 pointer-events-none select-none">
                        </div>
                    `).join('')}
                </div>
            `).join('');

            // 5. يدي (تأمين عدم اختفاء الكروت)
            const myHandContainer = document.getElementById('my-hand');
            let myCards = roomState.hands[myPlayerId] || [];
            
            if (myCards.length === 0) {
                myHandContainer.innerHTML = `<div class="w-full text-center text-zinc-500 font-bold text-sm">جاري التوزيع...</div>`;
            } else {
                myHandContainer.innerHTML = myCards.map((card, idx) => getCardHTML(card, selectedCards.includes(idx), idx, false)).join('');
            }

            if (!handSortable && myCards.length > 0) {
                handSortable = new Sortable(myHandContainer, {
                    animation: 150, delay: 150, delayOnTouchOnly: true,
                    onEnd: function (evt) {
                        let currentCards = roomState.hands[myPlayerId] || [];
                        const item = currentCards.splice(evt.oldIndex, 1)[0];
                        currentCards.splice(evt.newIndex, 0, item);
                        roomState.hands[myPlayerId] = currentCards; 
                        selectedCards = []; // إعادة التعيين لتجنب اختلاط الفهارس (Indexes)
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode), { [`hands.${myPlayerId}`]: currentCards });
                        renderGameBoard();
                    }
                });
            }

            // 6. عداد نقاط التحديد
            const badge = document.getElementById('selection-points-badge');
            if (selectedCards.length > 0) {
                let selCardsCodes = selectedCards.map(idx => myCards[idx]);
                let pts = calculatePoints(selCardsCodes, false); 
                document.getElementById('selection-points-val').innerText = pts;
                badge.classList.remove('hidden');
                
                // تلوين البادج حسب الشرط
                if(!roomState.hasMelded[myPlayerId] && pts < requiredScore) { badge.classList.replace('bg-blue-600', 'bg-rose-600'); badge.classList.replace('border-blue-400', 'border-rose-400'); }
                else { badge.classList.replace('bg-rose-600', 'bg-blue-600'); badge.classList.replace('border-rose-400', 'border-blue-400'); }
            } else { badge.classList.add('hidden'); }

            // 7. الأزرار
            const isMyTurn = roomState.turn === myPlayerId;
            document.getElementById('btn-meld').disabled = !isMyTurn || selectedCards.length < 3;
            document.getElementById('btn-discard').disabled = !isMyTurn || selectedCards.length !== 1 || !hasDrawnThisTurn;
            document.getElementById('btn-add-meld').style.display = (isMyTurn && selectedCards.length > 0 && roomState.tableMelds.length > 0) ? 'flex' : 'none';
            document.getElementById('btn-undo').style.display = (undoStack.length > 0 && isMyTurn) ? 'flex' : 'none';

            const turnEl = document.getElementById('turn-indicator');
            if (isMyTurn) { turnEl.innerText = "دورك الآن!"; turnEl.className = "absolute top-4 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-zinc-900 px-6 py-1.5 rounded-full font-black text-sm shadow-[0_0_15px_rgba(234,179,8,0.5)] z-20"; } 
            else { let currentPlayer = roomState.players.find(p => p.uid === roomState.turn); turnEl.innerText = `دور: ${currentPlayer ? currentPlayer.name : '...'}`; turnEl.className = "absolute top-4 left-1/2 transform -translate-x-1/2 bg-zinc-800 text-white px-6 py-1.5 rounded-full font-bold text-xs shadow-lg z-20 opacity-80"; }
        }

        function renderScoreboard() {
            document.getElementById('view-game').classList.add('hidden'); document.getElementById('view-game').classList.remove('flex');
            const sb = document.getElementById('game-scoreboard');
            sb.classList.remove('hidden'); sb.classList.add('flex');
            
            let winnerName = roomState.players.find(p => p.uid === roomState.roundWinner)?.name || 'مجهول';
            document.getElementById('sb-title').innerText = roomState.isJokerClose ? `${winnerName} قفل بجوكر! 🔥` : `فاز ${winnerName}`;
            
            const list = document.getElementById('sb-players-list');
            list.innerHTML = roomState.players.map(p => {
                let roundScore = 0;
                let isWinner = p.uid === roomState.roundWinner;
                
                if (!isWinner) {
                    if (!roomState.hasMelded[p.uid]) roundScore = 100; // عقوبة اللي مو نازل
                    else roundScore = calculatePoints(roomState.hands[p.uid], true); // مجموع اليد
                    if (roomState.isJokerClose) roundScore *= 2; // دبل
                }

                return `
                <div class="flex justify-between items-center bg-zinc-800 p-3 rounded-xl border border-zinc-700">
                    <span class="font-bold text-white">${p.name} ${isWinner ? '👑' : ''}</span>
                    <div class="flex gap-4">
                        <div class="text-center"><span class="block text-[10px] text-zinc-500 uppercase">هذه الجولة</span><span class="font-black ${isWinner?'text-emerald-400':'text-rose-400'}">+${roundScore}</span></div>
                        <div class="text-center"><span class="block text-[10px] text-zinc-500 uppercase">المجموع الكلي</span><span class="font-black text-white">${roomState.scores[p.uid]}</span></div>
                    </div>
                </div>`;
            }).join('');

            if (myPlayerId === roomState.hostId) document.getElementById('btn-next-round').classList.remove('hidden');
        }

        /* ==================== 4. حركات اللعب ==================== */
        async function applyTurnUpdate(updates) {
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'concan_rooms', currentRoomCode), updates); selectedCards = []; } 
            catch(e) { alert("حدث خطأ في الشبكة! تأكد من الاتصال."); }
        }

        window.undoAction = function() {
            if (undoStack.length === 0 || roomState.turn !== myPlayerId) return; vibe(20);
            let lastState = undoStack.pop();
            applyTurnUpdate({ tableMelds: lastState.tableMelds, [`hands.${myPlayerId}`]: lastState.myHand, [`hasMelded.${myPlayerId}`]: lastState.hasMelded, highestMeld: lastState.highestMeld, highestMeldTeam: lastState.highestMeldTeam });
        }

        window.drawFromDeck = function() {
            if (roomState.turn !== myPlayerId || hasDrawnThisTurn || roomState.deck.length === 0) return vibe(50);
            vibe(15); undoStack = []; 
            let deck = [...roomState.deck]; let myHand = [...roomState.hands[myPlayerId]]; myHand.push(deck.pop());
            let players = [...roomState.players]; let p = players.find(x => x.uid === myPlayerId); p.cardCount = myHand.length;
            hasDrawnThisTurn = true; applyTurnUpdate({ deck: deck, [`hands.${myPlayerId}`]: myHand, players: players });
        }

        window.drawFromDiscard = function() {
            if (roomState.turn !== myPlayerId || hasDrawnThisTurn || roomState.discard.length === 0) return vibe(50);
            vibe(15); undoStack = [];
            let discard = [...roomState.discard]; let myHand = [...roomState.hands[myPlayerId]]; myHand.push(discard.pop());
            let players = [...roomState.players]; let p = players.find(x => x.uid === myPlayerId); p.cardCount = myHand.length;
            hasDrawnThisTurn = true; applyTurnUpdate({ discard: discard, [`hands.${myPlayerId}`]: myHand, players: players });
        }

        window.meldSelectedCards = function() {
            if (roomState.turn !== myPlayerId || selectedCards.length < 3) return; vibe(20);
            
            let myHand = [...roomState.hands[myPlayerId]];
            let meldCards = [];
            
            // الفرز التنازلي يضمن عدم تغير الفهارس (Indexes) أثناء الحذف
            selectedCards.sort((a,b) => b - a).forEach(idx => { meldCards.push(myHand[idx]); myHand.splice(idx, 1); });

            let points = calculatePoints(meldCards, false);
            let myTeam = roomState.players.find(p => p.uid === myPlayerId)?.team;
            
            let updates = {};
            if (!roomState.hasMelded[myPlayerId]) {
                let required = 51;
                if (roomState.highestMeldTeam && roomState.highestMeldTeam !== myTeam) required = roomState.highestMeld + 1;
                if (points < required) { vibe(50); return alert(`نقاط مجموعتك (${points}) أقل من المطلوب (${required})!`); }
                updates[`hasMelded.${myPlayerId}`] = true;
                if (points >= required && points > roomState.highestMeld) { updates.highestMeld = points; updates.highestMeldTeam = myTeam; }
            }

            undoStack.push({ tableMelds: JSON.parse(JSON.stringify(roomState.tableMelds)), myHand: JSON.parse(JSON.stringify(roomState.hands[myPlayerId])), hasMelded: roomState.hasMelded[myPlayerId], highestMeld: roomState.highestMeld, highestMeldTeam: roomState.highestMeldTeam });

            let tableMelds = [...roomState.tableMelds]; tableMelds.push({ cards: meldCards });
            let players = [...roomState.players]; let p = players.find(x => x.uid === myPlayerId); p.cardCount = myHand.length;

            updates.tableMelds = tableMelds; updates[`hands.${myPlayerId}`] = myHand; updates.players = players;
            applyTurnUpdate(updates);
        }

        window.addSelectedToMeld = function(meldIndex) {
            if (roomState.turn !== myPlayerId || selectedCards.length === 0) return;
            if (!roomState.hasMelded[myPlayerId]) return alert("يجب أن تنزل أولاً قبل التركيب!");
            vibe(15);

            undoStack.push({ tableMelds: JSON.parse(JSON.stringify(roomState.tableMelds)), myHand: JSON.parse(JSON.stringify(roomState.hands[myPlayerId])), hasMelded: roomState.hasMelded[myPlayerId], highestMeld: roomState.highestMeld, highestMeldTeam: roomState.highestMeldTeam });

            let myHand = [...roomState.hands[myPlayerId]]; let tableMelds = [...roomState.tableMelds]; let targetMeld = [...(tableMelds[meldIndex].cards || [])];
            selectedCards.sort((a,b) => b - a).forEach(idx => { targetMeld.push(myHand[idx]); myHand.splice(idx, 1); });
            tableMelds[meldIndex] = { cards: targetMeld };
            let players = [...roomState.players]; let p = players.find(x => x.uid === myPlayerId); p.cardCount = myHand.length;

            let winner = null; if (myHand.length === 0) winner = myPlayerId;
            applyTurnUpdate({ tableMelds: tableMelds, [`hands.${myPlayerId}`]: myHand, players: players, roundWinner: winner, status: winner ? 'round_end' : 'playing' });
        }

        window.discardSelectedCard = function() {
            if (roomState.turn !== myPlayerId || selectedCards.length !== 1 || !hasDrawnThisTurn) return; vibe(30);

            let myHand = [...roomState.hands[myPlayerId]]; let discard = [...roomState.discard];
            let targetIdx = selectedCards[0]; let cardToDiscard = myHand[targetIdx];
            myHand.splice(targetIdx, 1); discard.push(cardToDiscard);

            let players = [...roomState.players]; let p = players.find(x => x.uid === myPlayerId); p.cardCount = myHand.length;

            if (myHand.length === 0) {
                let isJokerClose = cardToDiscard === 'jk';
                let newScores = { ...roomState.scores };
                players.forEach(player => {
                    if (player.uid !== myPlayerId) {
                        let penalty = !roomState.hasMelded[player.uid] ? 100 : calculatePoints(roomState.hands[player.uid], true);
                        if (isJokerClose) penalty *= 2;
                        newScores[player.uid] = (newScores[player.uid] || 0) + penalty;
                    }
                });
                applyTurnUpdate({ discard: discard, [`hands.${myPlayerId}`]: myHand, players: players, status: 'round_end', roundWinner: myPlayerId, isJokerClose: isJokerClose, scores: newScores });
                hasDrawnThisTurn = false; undoStack = []; return;
            }

            let currentIdx = players.findIndex(x => x.uid === myPlayerId);
            let nextIdx = (currentIdx + 1) % players.length; let nextTurnUid = players[nextIdx].uid;

            hasDrawnThisTurn = false; undoStack = [];
            applyTurnUpdate({ discard: discard, [`hands.${myPlayerId}`]: myHand, players: players, turn: nextTurnUid });
        }
    </script>
</body>
</html>
