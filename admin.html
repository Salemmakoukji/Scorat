<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorat | Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="icon" href="./logo.png" type="image/x-icon">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { primary: '#1a73e8', googleBg: '#f8f9fa' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f3f4; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800">

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-lg border border-gray-100 text-center">
            <span class="material-symbols-outlined text-6xl text-primary mb-4">admin_panel_settings</span>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">لوحة الإدارة</h1>
            <p class="text-sm text-gray-500 mb-6">تسجيل الدخول للمسؤولين فقط.</p>
            
            <input type="email" id="email-input" placeholder="البريد الإلكتروني" class="w-full bg-gray-50 border border-gray-200 text-center px-4 py-3 rounded-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none mb-3" dir="ltr">
            <input type="password" id="password-input" placeholder="كلمة المرور" class="w-full bg-gray-50 border border-gray-200 text-center px-4 py-3 rounded-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none mb-5" onkeypress="if(event.key==='Enter') adminLogin()" dir="ltr">
            <button onclick="adminLogin()" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-600 transition-colors"><span id="btn-login-text">دخول</span></button>
        </div>
    </div>

    <!-- التطبيق (مخفي حتى تسجيل الدخول) -->
    <div id="admin-app" class="hidden h-screen flex flex-col md:flex-row w-full">
        
        <!-- الشريط الجانبي (لشاشات الكمبيوتر) -->
        <aside class="w-64 bg-white border-l border-gray-200 flex-col hidden md:flex">
            <div class="p-6 border-b border-gray-100 flex items-center justify-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center shadow-md">
                    <span class="material-symbols-outlined text-[20px]">bolt</span>
                </div>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">Scorat Admin</h1>
            </div>
            
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('users')" id="tab-users" class="w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-primary bg-blue-50 transition-colors">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined">group</span> المستخدمين</div>
                    <span id="badge-users" class="bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
                </button>
                <button onclick="switchTab('live')" id="tab-live" class="w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined">podcasts</span> الألعاب المباشرة</div>
                    <span id="badge-live" class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
                </button>
                <button onclick="switchTab('matches')" id="tab-matches" class="w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined">history</span> السجل</div>
                    <span id="badge-matches" class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
                </button>
                <button onclick="logoutAdmin()" class="w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-red-600 hover:bg-red-50 transition-colors mt-8">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined">logout</span> تسجيل خروج</div>
                </button>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            
            <!-- الهيدر للموبايل -->
            <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10 shadow-sm">
                <h1 class="text-lg font-bold text-primary flex items-center gap-1"><span class="material-symbols-outlined">shield</span> Admin</h1>
                <button onclick="logoutAdmin()" class="text-red-500 flex items-center justify-center p-1 rounded-lg hover:bg-red-50">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </header>

            <!-- التبويبات العلوية (للموبايل) -->
            <div class="md:hidden flex bg-white border-b border-gray-200 overflow-x-auto hide-scroll">
                <button onclick="switchTab('users')" id="mobile-tab-users" class="flex-1 py-3 px-4 text-sm font-bold border-b-2 border-primary text-primary whitespace-nowrap">المستخدمين</button>
                <button onclick="switchTab('live')" id="mobile-tab-live" class="flex-1 py-3 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500 whitespace-nowrap">المباشر</button>
                <button onclick="switchTab('matches')" id="mobile-tab-matches" class="flex-1 py-3 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500 whitespace-nowrap">السجل</button>
            </div>

            <!-- هيدر الصفحة -->
            <div class="p-6 pb-2 flex justify-between items-center">
                <h2 id="page-title" class="text-2xl font-bold text-gray-800">إدارة المستخدمين</h2>
                <button onclick="loadData()" class="bg-white border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-gray-50 flex items-center gap-1 shadow-sm transition-all active:scale-95">
                    <span class="material-symbols-outlined text-[18px]">refresh</span> تحديث
                </button>
            </div>

            <!-- محتوى التبويبات -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6 relative">
                
                <!-- شاشة التحميل -->
                <div id="loading" class="absolute inset-0 bg-[#f1f3f4] z-10 flex flex-col items-center justify-center hidden">
                    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                    <span class="text-sm font-bold text-gray-500">جاري جلب البيانات...</span>
                </div>

                <!-- تبويب المستخدمين -->
                <div id="view-users" class="space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm">
                                <thead class="bg-gray-50 text-gray-600 border-b border-gray-200 text-xs uppercase">
                                    <tr>
                                        <th class="px-6 py-4 font-bold">المستخدم</th>
                                        <th class="px-6 py-4 font-bold">المعرف (ID)</th>
                                        <th class="px-6 py-4 font-bold text-center">إحصائيات (فوز/خسارة)</th>
                                        <th class="px-6 py-4 font-bold text-center">إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body" class="divide-y divide-gray-100">
                                    <!-- يتم الحشو بواسطة جافاسكربت -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- تبويب الألعاب المباشرة -->
                <div id="view-live" class="hidden space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="live-grid">
                        <!-- يتم الحشو بواسطة جافاسكربت -->
                    </div>
                </div>

                <!-- تبويب السجل (المباريات) -->
                <div id="view-matches" class="hidden space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm">
                                <thead class="bg-gray-50 text-gray-600 border-b border-gray-200 text-xs uppercase">
                                    <tr>
                                        <th class="px-6 py-4 font-bold">التاريخ</th>
                                        <th class="px-6 py-4 font-bold">المضيف</th>
                                        <th class="px-6 py-4 font-bold">النمط</th>
                                        <th class="px-6 py-4 font-bold text-center">الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="matches-table-body" class="divide-y divide-gray-100">
                                    <!-- يتم الحشو بواسطة جافاسكربت -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- نافذة منبثقة (Modal) -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-[24px] shadow-2xl transform transition-transform scale-95 opacity-0 duration-200 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-5 border-b border-gray-100">
                <h2 id="modal-title" class="text-lg font-bold text-gray-800">عنوان</h2>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
                    <span class="material-symbols-outlined text-[18px]">close</span>
                </button>
            </div>
            <div id="modal-inner" class="p-5 overflow-y-auto"></div>
        </div>
    </div>

    <!-- الإشعارات (Toast) -->
    <div id="toast-container" class="fixed bottom-6 right-1/2 translate-x-1/2 md:translate-x-0 md:right-6 z-50 flex flex-col gap-2 w-[calc(100%-2rem)] max-w-sm"></div>

    <!-- سكربتات Firebase والمنطق -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc, collectionGroup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiX6ipa161rB1o715EfmtzfrHiz9zgChQ",
            authDomain: "dottech-scorat.firebaseapp.com",
            projectId: "dottech-scorat",
            storageBucket: "dottech-scorat.firebasestorage.app",
            messagingSenderId: "324240314924",
            appId: "1:324240314924:web:12866f2c25908f82fb7789",
            measurementId: "G-Y945QFFG3G"
        };

        const appId = 'scorat-app';
        let db, auth;
        let tempEditAvatarBase64 = null;
        
        const state = {
            currentTab: 'users',
            users: [],
            matches: [],
            liveGames: []
        };
        window.adminState = state;

        // التهيئة
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // مراقبة حالة تسجيل الدخول
        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-app').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-app').classList.add('hidden');
            }
        });

        // دوال المصادقة (Auth)
        window.adminLogin = async function() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) return showToast("الرجاء إدخال البريد وكلمة المرور", "error");
            
            const btnText = document.getElementById('btn-login-text');
            btnText.innerText = 'جاري الدخول...';
            try {
                await signInWithEmailAndPassword(auth, email, password);
                btnText.innerText = 'دخول';
            } catch (error) {
                console.error("Login Error:", error);
                showToast("البيانات غير صحيحة", "error");
                btnText.innerText = 'دخول';
            }
        }

        window.logoutAdmin = async function() {
            try { 
                await signOut(auth); 
                showToast("تم تسجيل الخروج"); 
            } catch(e) { 
                showToast("خطأ في الخروج", "error"); 
            }
        }

        // جلب البيانات مع حل مشكلة N+1
        window.loadData = async function() {
            document.getElementById('loading').classList.remove('hidden');
            ['users', 'live', 'matches'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden'));
            
            try {
                // 1. جلب المستخدمين
                const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
                state.users = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 2. جلب المباريات المباشرة
                const liveSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'liveGames'));
                state.liveGames = liveSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 3. جلب المباريات باستخدام التوازي (Promise.all) لسرعة الأداء وتقليل الاستهلاك
                const historyPromises = state.users.map(async (user) => {
                    const snap = await getDocs(collection(db, 'artifacts', appId, 'users', user.id, 'history'));
                    return snap.docs.map(d => ({ matchId: d.id, hostId: user.id, hostName: user.name, ...d.data() }));
                });
                
                const results = await Promise.all(historyPromises);
                state.matches = results.flat().sort((a,b) => b.date - a.date);

                renderData();
                showToast("تم تحديث البيانات بنجاح!");
            } catch (error) {
                console.error("Error loading data:", error);
                showToast("حدث خطأ أثناء جلب البيانات", "error");
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById(`view-${state.currentTab}`).classList.remove('hidden');
            }
        }

        /* --- التنقل بين التبويبات --- */
        window.switchTab = function(tab) {
            state.currentTab = tab;
            
            // تحديث العناوين
            const titles = { 'users': 'إدارة المستخدمين', 'live': 'الألعاب المباشرة', 'matches': 'سجل المباريات' };
            document.getElementById('page-title').innerText = titles[tab];

            // إخفاء جميع التبويبات
            ['users', 'live', 'matches'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                
                // تحديث قائمة الكمبيوتر
                const deskTab = document.getElementById(`tab-${t}`);
                if(deskTab) {
                    deskTab.className = t === tab 
                        ? 'w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-primary bg-blue-50 transition-colors' 
                        : 'w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-100 transition-colors';
                }

                // تحديث قائمة الجوال
                const mobTab = document.getElementById(`mobile-tab-${t}`);
                if(mobTab) {
                    mobTab.className = t === tab 
                        ? 'flex-1 py-3 px-4 text-sm font-bold border-b-2 border-primary text-primary whitespace-nowrap'
                        : 'flex-1 py-3 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500 whitespace-nowrap';
                }
            });

            // إظهار التبويب المحدد
            document.getElementById(`view-${tab}`).classList.remove('hidden');
        }

        /* --- دوال التصيير (Rendering) --- */
        function renderData() {
            document.getElementById('badge-users').innerText = state.users.length;
            document.getElementById('badge-live').innerText = state.liveGames.length;
            document.getElementById('badge-matches').innerText = state.matches.length;

            renderUsers();
            renderLiveGames();
            renderMatches();
        }

        function renderUsers() {
            const tbody = document.getElementById('users-table-body');
            if (state.users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">لا يوجد مستخدمين مسجلين.</td></tr>`;
                return;
            }

            tbody.innerHTML = state.users.map(u => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <img src="${u.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + u.name}" class="w-10 h-10 rounded-full object-cover border border-gray-200">
                            <div>
                                <div class="font-bold text-gray-800">${u.name}</div>
                                <div class="text-[10px] text-gray-400 mt-0.5">انضم: ${new Date(u.joinedAt || Date.now()).toLocaleDateString('ar-EG')}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-mono" dir="ltr">${u.id}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="inline-flex gap-2 text-xs font-bold bg-white border border-gray-200 px-3 py-1.5 rounded-lg">
                            <span class="text-green-600">${u.wins || 0} فوز</span>
                            <span class="text-gray-300">|</span>
                            <span class="text-red-500">${u.losses || 0} خسارة</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="openEditUser('${u.id}')" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition-colors" title="تعديل">
                                <span class="material-symbols-outlined text-[18px]">edit</span>
                            </button>
                            <button onclick="confirmDeleteUser('${u.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="حذف">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderLiveGames() {
            const container = document.getElementById('live-grid');
            if (state.liveGames.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-gray-400">لا يوجد ألعاب مباشرة حالياً.</div>`;
                return;
            }

            container.innerHTML = state.liveGames.map(g => `
                <div class="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-2 h-full bg-red-500 animate-pulse"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-gray-800">${g.hostName || 'مباراة مباشرة'}</h3>
                            <span class="text-xs text-gray-400 font-mono mt-1 block" dir="ltr">Host: ${g.hostId}</span>
                        </div>
                        <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> مباشر
                        </span>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl mb-4 text-sm">
                        <div class="flex justify-between mb-1"><span class="text-gray-500">النمط:</span> <span class="font-bold text-primary">${g.game?.mode || 'غير محدد'}</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">الجولات:</span> <span class="font-bold">${g.game?.rounds?.length || 0}</span></div>
                    </div>
                    <button onclick="confirmEndLiveGame('${g.id}')" class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-xl text-sm font-bold transition-colors">
                        إنهاء المباراة بالقوة
                    </button>
                </div>
            `).join('');
        }

        function renderMatches() {
            const tbody = document.getElementById('matches-table-body');
            if (state.matches.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">لا يوجد سجل مباريات.</td></tr>`;
                return;
            }

            tbody.innerHTML = state.matches.map(m => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-gray-800">${new Date(m.date).toLocaleDateString('ar-EG')}</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">${new Date(m.date).toLocaleTimeString('ar-EG')}</div>
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-700">${m.hostName}</td>
                    <td class="px-6 py-4">
                        <span class="bg-blue-50 text-primary px-2 py-1 rounded text-xs font-bold uppercase">${m.mode || 'Concan'}</span>
                        <span class="text-xs text-gray-500 mr-2">${m.rounds?.length || 0} جولات</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="confirmDeleteMatch('${m.matchId}', '${m.hostId}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="حذف السجل">
                            <span class="material-symbols-outlined text-[18px]">delete</span>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        /* --- الإجراءات (Actions) --- */
        window.openEditUser = function(uid) {
            const user = state.users.find(u => u.id === uid); if(!user) return;
            tempEditAvatarBase64 = user.avatar;
            
            showModal("تعديل المستخدم", `
                <div class="space-y-4">
                    <div class="flex justify-center mb-4 relative">
                        <div class="w-24 h-24 rounded-full border-2 border-dashed border-gray-300 overflow-hidden relative">
                            <img id="edit-avatar-preview" src="${user.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.name}" class="w-full h-full object-cover">
                            <label class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity cursor-pointer">
                                <span class="material-symbols-outlined text-white">edit</span>
                                <input type="file" accept="image/*" class="hidden" onchange="handleEditAvatar(event)">
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">الاسم</label>
                        <input type="text" id="edit-name" value="${user.name}" class="w-full bg-gray-50 border border-gray-200 px-4 py-2.5 rounded-xl text-sm outline-none focus:border-primary">
                    </div>
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1">مرات الفوز</label>
                            <input type="number" id="edit-wins" value="${user.wins || 0}" class="w-full bg-gray-50 border border-gray-200 px-4 py-2.5 rounded-xl text-sm outline-none focus:border-green-500">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1">مرات الخسارة</label>
                            <input type="number" id="edit-losses" value="${user.losses || 0}" class="w-full bg-gray-50 border border-gray-200 px-4 py-2.5 rounded-xl text-sm outline-none focus:border-red-500">
                        </div>
                    </div>
                    <button onclick="saveUserEdit('${uid}')" class="w-full mt-4 bg-primary text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">حفظ التعديلات</button>
                </div>
            `);
        }

        window.handleEditAvatar = function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 150;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } } 
                    else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    tempEditAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('edit-avatar-preview').src = tempEditAvatarBase64;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveUserEdit = async function(uid) {
            const name = document.getElementById('edit-name').value.trim();
            const wins = parseInt(document.getElementById('edit-wins').value) || 0;
            const losses = parseInt(document.getElementById('edit-losses').value) || 0;
            
            if(!name) return showToast("الاسم مطلوب", "error");
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), {
                    name: name,
                    wins: wins,
                    losses: losses,
                    avatar: tempEditAvatarBase64
                });
                showToast("تم تحديث بيانات المستخدم");
                closeModal();
                loadData(); // إعادة التحميل لضمان المزامنة
            } catch(e) {
                console.error(e);
                showToast("حدث خطأ أثناء التحديث", "error");
            }
        }

        window.confirmDeleteUser = function(uid) {
            showModal("تأكيد الحذف", `
                <p class="text-sm text-gray-600 mb-6">هل أنت متأكد من حذف هذا المستخدم؟ سيتم فقدان ملفه الشخصي وإحصائياته نهائياً.</p>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-bold">إلغاء</button>
                    <button onclick="executeDeleteUser('${uid}')" class="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold">نعم، احذف</button>
                </div>
            `);
        }

        window.executeDeleteUser = async function(uid) {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid));
                showToast("تم حذف المستخدم بنجاح");
                closeModal();
                state.users = state.users.filter(u => u.id !== uid);
                renderData();
            } catch(e) { showToast("خطأ في الحذف", "error"); }
        }

        window.confirmEndLiveGame = function(hostId) {
            showModal("إنهاء المباراة", `
                <p class="text-sm text-gray-600 mb-6">هل تريد إنهاء هذه المباراة المباشرة وإزالتها من القائمة العامة؟</p>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-bold">إلغاء</button>
                    <button onclick="executeEndLiveGame('${hostId}')" class="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold">إنهاء فوراً</button>
                </div>
            `);
        }

        window.executeEndLiveGame = async function(hostId) {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'liveGames', hostId));
                showToast("تم إزالة المباراة المباشرة");
                closeModal();
                state.liveGames = state.liveGames.filter(g => g.id !== hostId);
                renderData();
            } catch(e) { showToast("خطأ", "error"); }
        }

        window.confirmDeleteMatch = function(matchId, hostId) {
            showModal("حذف السجل", `
                <p class="text-sm text-gray-600 mb-6">سيتم حذف هذه المباراة من سجل اللاعب بشكل نهائي.</p>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-bold">إلغاء</button>
                    <button onclick="executeDeleteMatch('${matchId}', '${hostId}')" class="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold">حذف</button>
                </div>
            `);
        }

        window.executeDeleteMatch = async function(matchId, hostId) {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', hostId, 'history', matchId));
                showToast("تم حذف السجل");
                closeModal();
                state.matches = state.matches.filter(m => m.matchId !== matchId);
                renderData();
            } catch(e) { showToast("خطأ", "error"); }
        }

        /* --- واجهة المستخدم (UI Helpers) --- */
        function showModal(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-inner').innerHTML = content;
            const container = document.getElementById('modal-container');
            const modContent = document.getElementById('modal-content');
            
            container.classList.remove('hidden');
            setTimeout(() => {
                modContent.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        window.closeModal = function() {
            const container = document.getElementById('modal-container'); 
            const modContent = document.getElementById('modal-content');
            
            modContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { container.classList.add('hidden'); }, 200);
        }

        window.showToast = function(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-gray-800 border-l-4 border-red-500';
            const icon = type === 'success' ? 'check_circle' : 'error';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<span class="material-symbols-outlined text-[20px]">${icon}</span> <span class="font-bold text-sm">${msg}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            
            setTimeout(() => { 
                toast.classList.add('translate-y-10', 'opacity-0'); 
                setTimeout(() => toast.remove(), 300); 
            }, 3000);
        }
    </script>
</body>
</html>
